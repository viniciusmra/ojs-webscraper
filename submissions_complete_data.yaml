'14416':
  autores:
  - Livia Danielle Rodrigues do Nascimento
  - Maria Francineila Pinheiro dos Santos
  data_iniciado: 04/01/2024
  id: '14416'
  resumo: 'O Ensino de Geografia possibilita uma análise espacial da realidade do
    estudante e a tomada de consciência do mesmo sobre o contexto social no qual encontra-se
    inserido. O objetivo central deste estudo visa discutir os desenhos produzidos
    pelos estudantes do 9º ano nas aulas de Geografia acerca da Unidade de Conservação
    (UC): Reserva Extrativista Marinha da Lagoa do Jequiá - RESEX, lugar de vivência
    dos mesmos. Sendo assim, este encontra-se ancorada na abordagem qualitativa, centrada
    na pesquisa ação participativa, na qual estiveram envolvidos 46 estudantes da
    Escola Municipal José Cursino dos Santos. A análise dos desenhos produzidos pelos
    estudantes demonstra a percepção dos mesmos acerca da referida UC evidenciando
    aspectos relacionados ao centro da cidade de Jequiá, como a Ponte do município
    sob o Rio Jequiá, e associados com as atividades desenvolvidas da UC, como a pesca.
    Além da presença de embarcações, e a notória divisão entre os trechos que compõem
    a RESEX: Rio, lagoa e mar (litoral). Além disso, a UC é representada nos desenhos
    produzidos pelos estudantes, denotando problemas ambientais presentes na mesma,
    a importância e o uso dos recursos naturais, e ações para ajudar o meio ambiente.
    As análises dos dados permitiram verificar a compreensão dos estudantes acerca
    das paisagens e do lugar em que vivem através dos desenhos produzidos nas aulas
    de Geografia.'
