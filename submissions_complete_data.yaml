'14450':
  autores:
  - Rafael da Cruz
  - Hélio Mário de Araújo
  data_iniciado: 20/11/2024
  id: '14450'
  resumo: 'Os sistemas ambientais físicos representam a organização geográfica resultante
    da interação dos componentes físicos da natureza. No sistema urbano de Aracaju
    possuem expressão espacial e, como qualquer outro sistema funcionam através de
    fluxos de energia e matéria. Analisados sob a perspectiva geográfica, este estudo
    trata das características e complexidades dos elementos físico-naturais, visando
    à constatação da dinâmica ambiental a que está sujeita a área contígua do município
    de Aracaju. Baseado na abordagem sistêmica, o processo investigatório foi conduzido
    em três etapas diferenciadas: Levantamento bibliográfico e de documentos cartográficos
    e outros registros; Trabalho de campo, com registro fotográfico e Trabalho de
    gabinete, com análise laboratorial. Os resultados mostram que no espaço urbano
    de Aracaju os efeitos da ação humana sobre os sistemas naturais ocorrem em graus
    de intensidades diferenciadas como reflexo da inserção capitalista na produção
    do espaço, cuja situação se agrava pelo ritmo acelerado de crescimento da cidade
    nas últimas décadas. Essa situação, portanto, que muitas vezes não compatibiliza
    a sustentabilidade do desenvolvimento com a natureza, enquadra o município na
    classe de paisagem regressiva pelo grau de antropização muito forte no processo
    de uso e ocupação do solo.'
