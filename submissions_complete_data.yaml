'14322':
  autores:
  - Andressa Paiva dos Santos
  - Oswaldo Palma Lopes Sobrinho
  - Wady Lima Castro Júnior
  data_iniciado: 31/08/2023
  id: '14322'
  resumo: 'O estudo dos padrões climáticos e das condições de umidade desempenha um
    papel crucial na compreensão das interações entre a atmosfera, a hidrosfera e
    a biosfera. Duas abordagens fundamentais que contribuem significativamente para
    essa compreensão são o Balanço Hídrico Climatológico (BHC) e as Classificações
    Climáticas de Köppen e Thornthwaite. O objetivo deste estudo foi calcular o Balanço
    Hídrico Climatológico (BHC) mensal bem como aplicar os sistemas de classificação
    climática (SCC) de Köppen e Thornthwaite para o município de Codó, Maranhão. Na
    elaboração do BHC foram utilizados dados meteorológicos, como: precipitação e
    temperatura média mensal referentes ao período de 2009 a 2011 obtidos da Estação
    Meteorológica Automática instalada no Campo Experimental do Instituto Federal
    de Educação, Ciência e Tecnologia do Maranhão (IFMA), localizado no município
    de Codó, MA. A capacidade de água disponível no solo (CAD) foi de 100 mm. Foi
    realizada a classificação climática baseada na metodologia de Köppen e a partir
    de valores obtidos dos índices: hídrico (Ih), de aridez (Ia) e de umidade (Iu)
    propostos pelo método de Thornthwaite. Observou-se um total anual de 107,5 mm
    para o excedente hídrico (EXC) e no mês de novembro se iniciou o período de reposição
    de água no solo se findando em dezembro, quando o solo atingiu sua capacidade
    máxima de armazenamento. A classificação climática para o município de Codó, MA
    é Cwa Subtropical quente com inverno seco pela classificação de Köppen e B1 w2
    A’, subtipo climático b’4 de clima megatérmico úmido com deficiência hídrica (DEF)
    no inverno pela classificação de Thornthwaite.'
