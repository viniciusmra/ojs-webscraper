'14956':
  autores:
  - Maria Clara Galvão da Silva
  - Bartira Araújo da Silva Viana
  data_iniciado: 31/07/2025
  id: '14956'
  resumo: 'Este trabalho investigou a inclusão educacional de estudantes surdos no
    ensino de Geografia, com ênfase na utilização de fotografias como recurso pedagógico
    para promover uma educação acessível. Para atingir esse objetivo, foram delineados
    os seguintes objetivos específicos: i) relatar sobre a eficácia das fotografias
    na promoção da compreensão dos conceitos geográficos; ii) discorrer sobre a forma
    como as fotografias são apresentadas e exploradas no material pedagógico do livro
    didático “Expedições Geográficas”, destinado ao 6° ano do ensino fundamental,
    destacando a sua contribuição para a aprendizagem e inclusão de estudantes surdos.
    A pesquisa busca, assim, entender o impacto das imagens na construção do conhecimento
    geográfico e na facilitação do processo de inclusão desses estudantes. A pesquisa
    adota uma abordagem qualitativa, com levantamento bibliográfico e análise do livro
    didático “Expedições Geográficas” como material de estudo. Os resultados evidenciam
    que a integração de imagens com Libras torna o conteúdo mais acessível, mas a
    clareza dos recursos visuais e sua contextualização pedagógica ainda precisam
    de melhorias. Por meio da revisão de literatura e da avaliação do uso de recursos
    visuais, foi possível concluir que as fotografias desempenham um papel essencial
    na superação das barreiras linguísticas, promovendo uma aprendizagem mais inclusiva.'
  revisores: []
  situacao: Em avaliação
  titulo: 'A CONTRIBUIÇÃO DO LIVRO DIDÁTICO EXPEDIÇÕES GEOGRÁFICAS PARA A INCLUSÃO
    DE ESTUDANTES SURDOS: UMA ANÁLISE DAS FOTOGRAFIAS'
