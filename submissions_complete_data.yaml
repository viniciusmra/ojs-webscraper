'14951':
  autores:
  - Antonia Marcia Duarte Queiroz
  - Atácida Carlos dos Santos Carlos Santos
  data_iniciado: 31/07/2025
  id: '14951'
  resumo: A pesquisa intitulada “As Tecnologias de Informação e Comunicação como instrumento
    de ensino geográfico na educação especial e inclusiva” investiga a aplicação das
    Tecnologias da Informação e Comunicação (TIC) no ensino de Geografia em Salas
    de Recursos Multifuncionais (SRM) em Araguaína-TO. Essas salas, inseridas na rede
    pública, têm como objetivo apoiar estudantes com deficiência, transtornos globais
    do desenvolvimento e altas habilidades, constituindo ambientes estratégicos para
    a promoção de práticas pedagógicas inclusivas. Por meio de uma abordagem qualitativa,
    o estudo busca entender como as tecnologias digitais podem ser aliadas na personalização
    do ensino e no desenvolvimento das habilidades desses alunos. Os resultados parciais
    revelam desafios significativos, sendo a falta de capacitação docente um dos principais.
    As dificuldades estruturais, como a escassez de recursos e a formação inadequada
    dos docentes, evidenciam a urgência de políticas públicas que promovam a formação
    continuada e investimentos em tecnologia assistiva. Ao valorizar a mediação tecnológica
    e o raciocínio geográfico, promove-se um ensino mais equitativo e acessível, adaptado
    à diversidade dos estudantes da educação básica. Com base nas coletas de dados
    realizadas, no ano de 2024 e início de 2025. este trabalho contribui para o debate
    sobre inclusão educacional, apontando direções para o aprimoramento das práticas
    pedagógicas com o uso das TIC.
