'14757':
  autores:
  - Arthur Gutemberg Andion Farias Moura
  - Aline Maria Meiguins de Lima
  - Yuri Antonio da Silva Rocha
  data_iniciado: 28/12/2024
  id: '14757'
  resumo: O presente trabalho explorou o uso de imagens de alta resolução da constelação
    PlanetScope para o monitoramento e quantificação de áreas florestais na Ilha de
    Cotijuba, localizada no estado do Pará, Brasil. Utilizando o Índice de Vegetação
    por Diferença Normalizada (NDVI) e técnicas avançadas de geoprocessamento, o objetivo
    foi quantificar a cobertura florestal da ilha usando imagens planet scope. As
    imagens PlanetScope, com resolução espacial entre 3 e 5 metros, foram fundamentais
    para realizar uma análise detalhada da vegetação, facilitando a identificação
    de áreas florestais. A classificação supervisionada das imagens planets resultou
    em uma acurácia de 92%, comprovando a eficácia dessas tecnologias no monitoramento
    florestal. Os resultados indicam que mais de 62% da ilha permanece coberta por
    florestas, apesar do crescimento urbano e das atividades agrícolas. De acordo
    com esse cenário, este estudo reforça a relevância das geotecnologias no planejamento
    territorial e na preservação ambiental, demonstrando como a combinação de imagens
    de satélite de alta resolução com índices como o NDVI pode aprimorar a quantificação
    na cobertura florestal e apoiar a gestão sustentável dos recursos naturais.
  revisores:
  - arquivo_revisor: Clécia_Cristina_Guimarães_14757-54732-1-RV.docx
    comentarios: Caros autores, O artigo apresenta como originalidade a utilização
      de imagens Planet para o monitoramento ambiental. Traz um objetivo claro e a
      metodologia foi desenhada para alcançar esse objetivo. No entanto, alguns passos
