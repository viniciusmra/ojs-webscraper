'14871':
  autores:
  - Terina Rocha Batista
  - Sarah Andrade Sampaio
  - Regina Célia de Oliveira
  data_iniciado: 01/05/2025
  id: '14871'
  resumo: A geomorfologia fornece as bases científicas para compreender como os processos
    naturais moldam o terreno e como a intervenção humana pode modificar ou intensificar
    esses processos. Ao mapear as características do relevo, identificar áreas de
    risco e avaliar o impacto das atividades humanas, é possível embasar estratégias
    de planejamento mais eficientes e adaptáveis, aplicáveis em diversas escalas de
    análise cartográfica. Nesse sentido, esse trabalho realizou o mapeamento geomorfológico
    do município de Cubatão, no estado de São Paulo, sob a metodologia de Argento
    (1944) identificando e classificando os modelados e formas de relevo associadas
    aos depósitos sedimentares e à cadeia cristalina seguindo parâmetros morfométricos
    do IBGE (2009) para diferenciação dos fatos geomorfológicos como o Índice de Dissecação
    do Relevo (IDR), dados altimétricos e clinográficos. No trato das questões relacionadas
    ao planejamento, esse trabalho também mapeou distintas classes de uso e ocupação
    das terras. Como resultados do trabalho, indica-se que a junção dessas cartografias
    permitiu integrar o planejamento urbano com as características geomorfológicas
    presentes no território, em um contexto urbano e industrial como o de Cubatão,
    com foco na identificação de áreas de risco e diante dos processos e dinâmicas
    do relevo. A rápida urbanização, aliada à ocupação de áreas de risco, como encostas
    e regiões suscetíveis a inundações, agrava ainda mais a exposição da população
    a esses fenômenos no município em questão. Além disso, as características naturais
    do relevo, com declividades acentuadas e a proximidade de cursos d'água, intensificam
    os riscos associados às interações entre os processos geomorfológicos e as ações
    humanas, exigindo um planejamento adequado para mitigar estes impactos.
