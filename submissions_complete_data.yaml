'14647':
  autores:
  - Marcos Paulo Gomes Gonçalves
  data_iniciado: 02/08/2025
  id: '14647'
  resumo: Devido à relevância do tema e a importância de identificar o período de
    maior ocorrência de queimadas, visando minimizar prejuízos, riscos e custos no
    combate, além de facilitar ações preventivas pelos órgãos responsáveis; este estudo
    objetivou caracterizar a dinâmica da relação entre focos de calor, indicativos
    diretos da ocorrência de queimadas, e precipitação pluviométrica no município
    de Uruçuí-PI, no período de 2003 a 2023. Dessa maneira, verificou-se que os meses
    de julho a outubro são os mais críticos para a ocorrência de focos de calor e,
    consequentemente, de queimadas, no município de Uruçuí. Estes meses secos aumentam
    a suscetibilidade da vegetação a queimadas. Notadamente, agosto e setembro apresentam
    uma incidência significativamente maior de focos de calor em comparação aos outros
    meses. O monitoramento das secas é de fundamental importância para minimizar o
    impacto das queimadas, visto que há uma associação entre anos de menor precipitação
    pluviométrica e a maior ocorrência de focos de calor.
  revisores:
  - arquivo_revisor: Daniel_César_de_Carvalho_14647-54894-1-RV.docx
    comentarios: No início do artigo, foi apontada que uma das principais causas das
      queimadas são ações antrópicas. É sabido que o município de Uruçuí abriga grandes
      produtores de agronegócio, porém em todo o resultado apresentado não houve uma
      “ponte” entre atividades econômicas desenvolvidas no Cerrado e as queimadas;
      houve a constatação de que a queimadas são propiciadas pela aliança dos fatores
      naturais (temperaturas elevadas e tipo de vegetação). Importante levantar no
      texto questões mais profundas de investigação.Verificar se todo o texto está
      em correspondência com os padrões de formatação solicitados pela Revista (rever
      margens, títulos de figura, formatação de referências e lista da mesma).O resumo
      está com problemas de coesão e coerência e a conclusão está muito econômica,
      deixando o artigo carente de um fechamento.
