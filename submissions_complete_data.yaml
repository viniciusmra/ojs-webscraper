'14938':
  autores:
  - Raquel Carvalho De Souza
  - Daniella Souza Cardoso da Silva
  - Sirius Oliveira Souza
  data_iniciado: 17/07/2025
  id: '14938'
  resumo: Este artigo tem como objetivo analisar os fatores estruturais, curriculares
    e socioculturais que contribuem para o afastamento de jovens da Educação de Jovens
    e Adultos (EJA) em idade regular, no município de Senhor do Bonfim (BA). A pesquisa
    fundamentou-se inicialmente em análise documental, seguida pela realização de
    uma intervenção pedagógica, aplicação de entrevistas e análise de conteúdo conforme
    a abordagem de Bardin (2016). Os resultados indicam que o livro didático da EJA,
    adotado pelo Estado da Bahia, carece de conteúdos mais aprofundados em Geografia,
    refletindo a escassez de discussões sobre essa modalidade de ensino na Base Nacional
    Comum Curricular (BNCC). Constatou-se que a maioria dos estudantes tende a não
    prosseguir com os estudos após o Ensino Médio, optando, em alguns casos, por cursos
    técnicos. Destaca-se ainda a influência das questões de gênero, especialmente
    no afastamento das mulheres da escola. Conclui-se que é fundamental fortalecer
    o ensino de Geografia por meio da qualificação dos materiais didáticos e da oferta
    sistemática de formação continuada aos docentes. Reitera-se, por fim, a necessidade
    da elaboração de um documento nacional específico para a EJA, que assegure a qualidade
    do ensino pautado nos princípios da educação popular.
