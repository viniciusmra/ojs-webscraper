'14929':
  autores:
  - Manoela Evelim Vitor da Silva
  - Roberval Soares Santos
  data_iniciado: 07/07/2025
  id: '14929'
  resumo: 'A criminalidade urbana é um fenômeno complexo que exige soluções integradas
    e fundamentadas em dados. A crescente disponibilidade de registros digitais e
    técnicas de geoprocessamento permite análises mais aprofundadas sobre a distribuição
    espacial dos crimes. Este trabalho tem como foco a cidade de Salvador – BA, buscando
    identificar padrões e zonas críticas com base em dados de crimes contra à vida,
    tais como homicídio, feminicídio e roubo com resultado morte. A proposta central
    é aplicar Sistemas de Informação Geográfica (SIG) e análise estatística para subsidiar
    políticas públicas voltadas à segurança. Para isso, utilizou-se como procedimentos
    metodológicos a linguagem de programação Python e as técnicas de produção cartográfica
    de geoprocessamento no QGIS, assim como, Kernel Density Estimation. Os dados empregados
    na análise criminal foram de origem primária, compreendendo informações sobre
    eventos criminosos, incluindo: data, tipo de crime, localização geográfica e número
    de vítimas, tendo como fonte a Secretaria de Segurança Pública do Estado da Bahia
    – SSP/BA. Além disso, foram considerados dados contextuais, como características
    demográficas, socioeconômicas e ambientais das áreas analisadas. Por intermédio
    da análise criminal, notou-se que as Áreas de Integração de Segurança Pública
    em Salvador, de Periperi, Pau da Lima e Tancredo Neves, destacaram-se pela maior
    quantidade de crimes contra à vida intencionais em 2023. A análise espacial realizada
    com apoio do SIG demonstrou ser uma ferramenta poderosa na compreensão da criminalidade
    urbana. A evidência de padrões espaciais e temporais em bairros específicos de
    Salvador reforça a importância de estratégias de segurança pública territorializadas.'
  revisores:
  - arquivo_revisor: null
    comentarios: null
    data_arquivo_revisor: null
    data_recomendacao: null
    nome: Antonio Façanha
    recomendacao: null
  - arquivo_revisor: Mariane_Freiesleben_14929-55422-1-RV.docx
    comentarios: 'PROBLEMAS IDENTIFICADOS E SUGESTÕES DE CORREÇÃO 1. Formatação e
      EstruturaProblemas:Inconsistências na numeração de títulos (ex.: "Mapa 04" e
      "Gráfico 01" repetidos)Falta de padronização na formatação de títulos e subtítulosReferências
      a figuras/gráficos não numeradas sequencialmenteCorreções sugeridas:Revisar
      toda a numeração de mapas, gráficos e tabelas para manter sequência lógicaPadronizar
      formatação de títulos (ex.: todos em negrito ou todos com a mesma hierarquia)Verificar
      consistência entre citações no texto e legendas das figuras 2. Redação e ClarezaProblemas:Algumas
      frases muito longas e complexasRepetições de conceitos em diferentes seçõesUso
      inconsistente de termos técnicos (ex.: SIG vs GIS)Correções sugeridas:Dividir
      frases longas em períodos mais curtosEliminar redundâncias entre introdução,
      fundamentação teórica e considerações finaisPadronizar termos técnicos (escolher
      entre SIG ou GIS e manter consistente) 3. Aspectos MetodológicosProblemas:Falta
      de detalhes sobre pré-processamento dos dadosMétodos estatísticos poderiam ser
      mais bem explicadosLimitações dos dados não são discutidas suficientementeCorreções
      sugeridas:Incluir seção específica sobre pré-processamento (limpeza, tratamento
      de missing values etc.)Explicar melhor os parâmetros usados no KDE (bandwidth
      selecionado etc.)Discutir limitações dos dados da SSP/BA (subnotificação, qualidade
      etc.) 4. Análise de ResultadosProblemas:Algumas conclusões não parecem totalmente
      suportadas pelos dados apresentadosFaltam testes estatísticos para validar correlações
      sugeridasPouca discussão sobre possíveis viesesCorreções sugeridas:Incluir medidas
      de significância estatística para padrões identificadosDiscutir possíveis fatores
      de confusão nas correlações observadasAdicionar análise de sensibilidade para
      principais resultados 5. Referências e CitaçõesProblemas:Formatação inconsistente
      das referênciasAlgumas citações no texto não aparecem nas referênciasReferências
      poderiam ser mais atualizadasCorreções sugeridas:Padronizar formatação das referências
      (ex.: seguir norma ABNT ou APA)Verificar correspondência entre citações no texto
      e lista de referênciasIncluir trabalhos mais recentes (últimos 5 anos) sobre
      o tema SUGESTÕES DE MELHORIAS ADICIONAISIncluir resumo estruturado (objetivos,
      métodos, resultados, conclusões)Adicionar abstract em inglês mais completoIncluir
      keywords em português, inglês e espanholMelhorar visualização de dados:Gráficos
      poderiam usar cores mais acessíveisMapas poderiam incluir escalas e orientação
      mais claras5. Expandir discussão sobre implicações para políticas públicas6.
      Incluir seção sobre ética no uso de dados criminais'
