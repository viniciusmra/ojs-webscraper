'14943':
  autores:
  - Vânia Regina Jorge da Silva
  data_iniciado: 24/07/2025
  id: '14943'
  resumo: 'O presente artigo representa a necessidade pessoal de refletir a respeito
    do processo de inclusão escolar para então, poder se falar em ensino de Geografia.
    Vale ressaltar que no Brasil até a década de 1990 a história de atendimento educacional
    à pessoa com deficiência era marcada por segregação e/ou exclusão social. A partir
    de então, a política educacional prevê a inclusão de todos os alunos no ensino
    regular, considerando suas distintas condições físicas, linguísticas, sociais
    e emocionais. Embora isto tenha representado um avanço em termos quantitativos,
    ainda estamos longe de alcançar a qualidade no ensino para todos. Então, ao integrar
    alunos com deficiência em escolas e turmas regulares, podemos estar reforçando
    processos de exclusão e de segregação. Portanto, fazemos algumas perguntas: Como
    pensar a cidadania reafirma as necessidades dos alunos com deficiência, mas também,
    dos demais agentes no processo de ensino-aprendizagem que se quer inclusivo? O
    que dizem as políticas públicas na forma de leis?  A partir desses questionamentos,
    temos por objetivo considerar a noção de cidadania como um elemento chave para
    o processo de inclusão escolar. Como objetivos específicos, esclarecer a diferença
    entre integração e inclusão; transcorrer sobre a noção de cidadania pertinente
    a esta problemática; destacar algumas legislações intervenientes. Para tal, pretendemos
    apresentar as nossas compreensões a respeito das políticas públicas de inclusão
    na forma de leis; sobre inclusão e integração tendo como referência Mantoan (2003),
    entre outros autores; sobre deficiência de acordo com Vygotsky (2011) quando este
    expõe a respeito da defectologia; a respeito da noção de cidadania com Palma Filho
    (1998) e Manzini-Couvre (1991).'
  revisores: []
  situacao: Em avaliação
  titulo: 'PENSAR A CIDADANIA PARA PROMOVER A INCLUSÃO: DIREITOS DOS ENVOLVIDOS NO
    PROCESSO DE EDUCAÇÃO ESCOLAR'
  versao_autor: []
  versao_avaliacao: 14943-55371-1-RV.docx
'14947':
  autores:
  - Elayne Cristina Rocha Dias
  - Raimundo Jucier Sousa de Assis
  data_iniciado: 28/07/2025
  id: '14947'
  resumo: 'O presente artigo, visa analisar as contribuições do uso das tirinhas da
    Mafalda, como recurso não convencional no ensino de geopolítica, para a formação
    de professores de geografia em uma perspectiva inclusiva para os educandos surdos,
    através de uma revisão literária. Esta pesquisa, justifica-se pela necessidade
    de um diálogo acessível e possibilitar aos docentes as várias possibilidades do
    uso das tiras em quadrinho da Mafalda, no processo de ensino, desenvolvimento
    e aprendizagem dos estudantes surdos, em relação a mediação dos conteúdos da Guerra
    Fria na América Latina, constituindo desta maneira sentido e significados sobre
    a educação geográfica. Neste sentido, a problemática consiste: quais as contribuições
    do uso das tirinhas da Mafalda proporcionadas aos professores de geografia no
    ensino de geopolítica, em uma perspectiva inclusiva aos estudantes surdos, através
    de uma análise literária? Destarte, os procedimentos metodológicos desenvolvidos
    ao longo da produção, corresponde a uma abordagem qualitativa, do tipo bibliográfica,
    nos seguintes portais de periódicos: Coordenação de Aperfeiçoamento de Pessoal
    de Nível Superior (CAPES) e Google acadêmico, subsidiando a formulação de dados
    sobre o objeto de estudo. Para a disseminação de informações buscamos como descritores:“geopolítica”,
    “contribuições” das tirinhas da Mafalda” e “recursos didáticos para surdos”, estabelecendo
    como recorte espaço-tempo entre 2008 – 2024 e uma análise dessas tirinhas em quadrinho
    de autoria de Quino (2008). Os resultados evidenciam que o sentido e significado
    no processo de aprendizagem dos estudantes surdos em relação ao ensino de conteúdos,
    em especial da Guerra Fria, são desenvolvidos acessivelmente através do uso da
    cultura visual, modalidade esta, essencial para a essa comunidade e com o uso
    da Língua Brasileira de Sinais (Libras). Assim, enfatizamos a importância do conhecimento
    da cultura e identidade surda pelos professores de geografia, como também, alinhar
    as aulas aos instrumentos mediadores (HQs da Mafalda), para o fortalecimento da
    constituição de representações geográficas para o novo e para o mundo. O uso das
    tirinhas da Mafalda, demonstram questões linguísticas, com significações da cultura
    visual, transmitem humor e ironia sobre as diversas situações políticas e que
    são marcadas no tempo e espaço.'
  revisores: []
  situacao: Em avaliação
  titulo: 'FORMAÇÃO DE PROFESSORES: PERSPECTIVAS INCLUSIVAS COM USO DOS HQs PARA O
    ENSINO DA GUERRA FRIA AOS ESTUDANTES SURDOS'
  versao_autor: []
  versao_avaliacao: 14947-55377-1-RV.docx
'14948':
  autores:
  - ADILSON TADEU BASQUEROTE
  - Enrique Pérez de Prada
  data_iniciado: 28/07/2025
  id: '14948'
  resumo: O estudo empreende uma análise aprofundada acerca da percepção dos estudantes
    da Educação Básica em relação à construção, no ambiente escolar, de recursos didáticos
    voltados à Educação Geográfica, especialmente sob a perspectiva inovadora da cartografia
    tátil. Trata-se de uma investigação metodológica estruturada como estudo de caso,
    caracterizada por sua natureza qualitativa, cujo corpus empírico foi constituído
    a partir da coleta de dados mediante observação participante e entrevistas semiestruturadas,
    aplicadas a um grupo de quinze estudantes do Colégio XXXXXXX, localizado na cidade
    de Rio do Sul, estado de Santa Catarina. A análise dos dados, orientada pela metodologia
    da análise do discurso, possibilitou a identificação de múltiplas contribuições
    decorrentes da construção coletiva dos recursos pedagógicos em sala de aula. Entre
    os resultados, destacou-se que a confecção desses instrumentos didáticos promove
    uma facilitação significativa na apreensão dos conteúdos e conceitos geográficos,
    potencializando a compreensão dos mesmos. Além disso, verifica-se que tal prática
    fomenta a interação e o engajamento dos sujeitos envolvidos no processo educativo,
    conferindo maior atratividade e dinamismo às aulas ministradas. Adicionalmente,
    ressalta-se a integração sinérgica entre os conhecimentos teóricos e as práticas
    pedagógicas, o que amplia o espectro de recursos didáticos aplicáveis à Educação
    Geográfica. Por fim, evidencia-se a relevância social desse processo, pois os
    materiais desenvolvidos apresentam potencial inclusivo, podendo ser adequadamente
    utilizados por estudantes com deficiências visuais ou baixa visão, contribuindo
    para a democratização do acesso ao conhecimento geográfico.
  revisores: []
  situacao: Em avaliação
  titulo: 'EDUCAÇÃO GEOGRÁFICA E RECURSOS DIDÁTICOS TÁTEIS: PERSPECTIVAS DE ESTUDANTES
    NA CONSTRUÇÃO DO SABER'
  versao_autor: []
  versao_avaliacao: 14948-55383-1-RV.docx
'14950':
  autores:
  - Hudson Mesquita de Sousa
  - Maria da Glória Duarte Ferro
  data_iniciado: 30/07/2025
  id: '14950'
  resumo: 'RESUMOO objetivo da pesquisa foi realizar uma revisão de literatura de
    alguns trabalhos no território brasileiro que efetuaram a aplicação de recursos
    didáticos voltados para o ensino da Geografia inclusiva para estudantes deficientes
    visuais, entre os anos de 2020 a 2023, mais especificamente, evidenciar os principais
    recursos utilizados, as vantagens e desvantagens apresentadas quanto a aplicação
    em aulas da Disciplina escolar Geografia. Para o âmbito acadêmico, o trabalho
    justifica-se como meio de potencializar as pesquisas que envolvem tal temática.
    Para o âmbito educacional, a pesquisa se faz importante para auxiliar e preparar
    os professores da Geografia acerca dos possíveis variáveis que possam surgir com
    a realização de práticas educativas com o uso de recursos didáticos voltados para
    alunos com deficiência visual nas escolas de nível básico. Além disso, o trabalho
    servirá como evidência acerca das potencialidades das práticas educativas voltadas
    para a educação pautada numa perspectiva inclusiva no ensino da ciência geográfica.
    Com base nisso levantam-se os seguintes problemas: I) Quais recursos didáticos
    são mais utilizados para poder alcançar o ensino aprendizagem dos alunos com deficiência
    visual acerca dos conteúdos geográficos? II) Quais os maiores pontos positivos
    e negativos que envolvem as práticas educativas com recursos didáticos inclusivos
    no ensino de geografia nas escolas de nível básico? Para atender ao objetivo proposto
    na pesquisa, optou-se pela pesquisa qualitativa. Quanto aos procedimentos, está
    pautada na pesquisa de levantamento. Metodologicamente, realizou-se a escolha
    da temática em questão. Em seguida, realizou-se a delimitação da temática educação
    inclusiva e ensino da Geografia, com base nisso se fez buscas bibliográficas de
    artigos, dissertações e teses, encontrados em repositórios, bibliotecas digitais,
    bases eletrônicas da CAPES e Google acadêmico. Por fim, compilaram-se os resultados
    em quadros quanto aos trabalhos encontrados para que, assim, fosse possível analisá-los
    e posteriormente, responder aos problemas da pesquisa.'
