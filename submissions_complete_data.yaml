'14714':
  autores:
  - Gustavo de Andrade
  - Flavia de Paula Duque Brasil
  data_iniciado: 13/08/2024
  id: '14714'
  resumo: O artigo aborda a adoção da agenda 2030 e de seus Objetivos de Desenvolvimento
    Sustentável (ODS) nas políticas públicas elaboradas pela Prefeitura de Belo Horizonte.
    A partir de um observatório urbano, denominado Observatório do Milênio, a investigação
    retrata a trajetória da experiência e a incorporação de suas premissas no planejamento
    das políticas públicas municipais. Foi identificada uma ausência de trabalhos
    que examinem uma experiência concreta de utilização dos ODS alinhados aos instrumentos
    de planejamento de municípios brasileiros, de modo que o trabalho desenvolvido
    visa a preencher esta lacuna. Discute-se a trajetória do conceito de desenvolvimento
    sustentável, sua polissemia e suas ressignificações ao longo do tempo, em especial
    nas agendas globais de organismos multilaterais. Recorreu-se a uma pesquisa qualitativa,
    por meio de um estudo de caso selecionado, adotando-se como técnicas o levantamento
    documental na unidade investigada, a observação direta e a realização de entrevistas
    semiestruturadas com atores envolvidos na experiência, seguidos de uma análise
    de conteúdo. Os principais achados da pesquisa revelam a construção de uma experiência
    singular e longeva, reconhecida interna e externamente, especialmente do ponto
    de vista de produção, disponibilização de informações e articulação de uma rede
    colaborativa. A partir de um compromisso formal da Prefeitura com a ONU-Habitat,
    as universidades e os centros de pesquisa locais, verificou-se que a agenda ODS
    se revela institucionalizada no município, gerando repercussões positivas. Pontos
    críticos a serem aprimorados residem na ampliação da participação social e apropriação
    mais sistemática das informações geradas para o cerne das políticas públicas municipais.
  revisores:
  - arquivo_revisor: null
    comentarios: Inicialmente agradecemos a leitura proporcionada pelo artigo, o qual
      objetivou desenvolver uma discussão acerca da adoção da agenda 2030 e de seus
      ODS nas políticas públicas elaboradas pela Prefeitura de Belo Horizonte, fruto
      do trabalho coletivo em um observatório urbano. Nesse sentido, o escrito dar
      conta do que se propõe, a partir da metodologia adotada. Ademais, tem uma escrita
      fluída e linear. Como sugestões, pediríamos que pudesse colocas as referências
      que estão em maiúsculo nos parenteses para a nova norma, bem como os traços
      para referências repetidas na seção das referências, conforme nova ABNT. Seria
      interessante, também, colocar em itálico as siglas em inglês usadas no texto.
