'14909':
  autores:
  - Manuela Nunes Leal
  - Maria da Paz da Cruz Vitorio de Oliveira
  data_iniciado: 28/05/2025
  id: '14909'
  resumo: 'O presente artigo analisa as disputas territoriais na região produtora
    de grãos frente à dinâmica do agronegócio e sua cadeia produtiva, evidenciando
    os impactos socioespaciais nos últimos anos. Dentre os objetivos específicos destaca-se:
    1) Analisar a ampliação do agronegócio de grãos nos últimos anos; 2) Identificar
    os conflitos por terra e água na região produtora de grãos no Estado do Piauí
    no período em análise; 3) Refletir sobre causas e desdobramentos dos conflitos
    territoriais na região produtora de grãos. O encaminhamento metodológico utilizado
    foi: a pesquisa bibliográfica sobre as seguintes categorias teóricas fundamentais
    para pesquisa: território, produção do espaço, agronegócio, povos tradicionais
    e conflitos no campo. O segundo encaminhamento metodológico foi leitura e análise
    dos relatórios do Centro de documentação Dom Tomás Balduíno (CEDOC)-Comissão Pastoral
    da Terra, no período 1997 – 2020, além da sistematização e análise das informações
    encontradas sobre as disputas territoriais no Piauí, com destaque para os municípios
    produtores de grão. Os conflitos na região produtora de grãos são prova dos desafios
    e questões para  debate e formulação de políticas públicas para regiões produtoras
    de grãos. Os dados sistematizados revelam a ampliação do agronegócio de grãos
    e a intensificação dos conflitos territoriais nos municípios produtores. No Piauí,
    os conflitos por terra e água envolvem as seguintes categorias: familiais de posseiros,
    assentados, pequenos proprietários, indígenas, sem-terra e ribeirinhos versos
    fazendeiros, grupos empresariais vinculados a cadeia produtiva de grãos, especuladores
    de terras, grileiros, políticos e grupos financeiros. Conclui-se que é medida
    urgente a regularização dos territórios das famílias em situação de conflito,
    bem como a proteção necessária para garantir condições mínimas de dignidade no
    sentido de que as famílias possam ter seus costumes e direitos respeitado, tais
    como seus direitos a terra, soberania alimentar e condições de trabalho, contribuindo,
    dessa forma, para a economia local.'
  revisores: []
  situacao: Em avaliação
  titulo: 'Disputas territoriais na região produtora de grãos no Piauí: conflitos
    e resistências 2016 - 2023'
