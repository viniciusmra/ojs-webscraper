'14444':
  autores:
  - Lucas Melo Costa
  - Josefa Eliane Santana de Siqueira Pinto
  data_iniciado: 25/08/2024
  id: '14444'
  resumo: Estudos sobre vulnerabilidade emergem como uma importante ferramenta para
    compreensão e análise integrada na ciência geográfica, ao envolver os contextos,
    social e ambiental, com o objetivo de compreender a paisagem e assim identificar
    os agravos sofridos pelo ambiente. Esse trabalho teve por objetivo analisar a
    vulnerabilidade ambiental na sub-bacia do rio Gararu, em Sergipe, afluente do
    Rio São Francisco, como subsídio para melhorar o uso e planejamento por parte
    da população e do Estado. Em termos metodológicos, foram utilizados métodos como
    o geossistema de Bertrand e a vulnerabilidade ambiental de Crepani, que visam
    identificar interação entre os sistemas antrópicos e ambientais. Em se tratando
    de espaço semiárido, após análises, foi possível constatar que, dos componentes
    ambientais, a maior vulnerabilidade deriva do comportamento irregular da pluviosidade,
    mas que os riscos estão associados ao conjunto natural e as ações sociais. Como
    os diferentes transtornos climatológicos causados pelas intensas chuvas de verão
    observados na área da sub-bacia causando enchentes, desmonte de pontes, movimentos
    de massa e lixiviação. Por fim, percebeu-se uma vulnerabilidade ambiental que
    versa de Média a Alta nos seus diferentes pontos de acordo com a metodologia aplicada.
    Entre unidades espaciais analisadas, foi perceptível ambientes com vulnerabilidades
    maiores que os demais devido ao uso e ocupação da terra e as características físicas
    locais. Por conseguinte, e pela análise empreendida, a conclusão é de que há setores
    diferenciados em suas paisagens e índices de vulnerabilidade socioambientais.
