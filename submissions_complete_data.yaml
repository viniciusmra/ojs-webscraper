'14511':
  autores:
  - Nayara da Silva Ribeiro
  - Joaquim Corrêa Ribeiro
  - Alfredo Zenen Dominguez Gonzalez
  data_iniciado: 25/03/2024
  id: '14511'
  resumo: 'Ao considerar os efeitos da degradação advinda da antropização dos recursos
    hídricos da região sudoeste de Mato Grosso, objetivou-se analisar os impactos
    das transformações antrópicas nas nascentes e matas ciliares da sub-bacia hidrográfica
    do córrego das Botas, como subsídio para o planejamento ambiental. As metodologias
    utilizadas incluíram: análise bibliográfica e documental, trabalho de campo, uso
    de dados das plataformas do IBGE, Mapbiomas e USGS Earth Explore, para realizar
    a caracterização geoambiental da área e identificar os fatores naturais que condicionam
    a disponibilidade hídrica da região, bem como, caracterizar a evolução histórica
    do processo de ocupação e uso das nascentes e matas ciliares, inventariar as nascentes
    e fragmentos de mata ciliar utilizando imagens de satélites, selecionar  amostras
    com base em critérios pré-definidos a partir de dados verificados em campo, avaliar
    o estado ambiental das nascentes e fragmentos de mata ciliar selecionados com
    base no cálculo do Índice de Impacto Ambiental em Nascentes-IIAN, e na Ficha de
    Caracterização Ambiental das Matas Ciliares ocorreu a identificação desses impactos.
    Os resultados obtidos revelam que os principais fatores da disponibilidade hídrica
    são: litologia, tipo de clima, padrão do relevo, tipo e espessura do solo e uso
    do solo. Nas nascentes estudadas, o desmatamento para utilização da pecuária e
    o uso da água para dessedentar o gado provocaram diversos impactos ambientais,
    fazendo com que 60% das 20 áreas de nascentes avaliadas se enquadram nas classes
    C (Ruim) ou D (Péssima) e apenas duas na classe B (Boa), não existindo nenhuma
    na classe A (Ótima). Quanto às matas ciliares, 88,2% dos 17 fragmentos analisados
    apresentam algum nível de degradação, predominando os que estão degradados a muito
    degradados, que representam 58,8% do total. Programas de proteção e conservação,
    potencialização da educação ambiental e devida fiscalização, se fazem pertinentes,
    dentro do manejo sustentável das áreas de nascentes e matas ciliares.'
