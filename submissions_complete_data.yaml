'14308':
  autores:
  - Mayra Gislayne Melo de Lima
  - Raimundo Mainar de Medeiros
  - Luciano Marcelo Fallé Saboya
  data_iniciado: 02/08/2025
  id: '14308'
  resumo: A pesquisa teve por objetivo utilizar a técnica dos quantis para caracterizar
    uma série histórica de 62 anos de índices médios pluviométricos e térmicos registrados
    de 1960 a 2021 na cidade de Bom Jesus – Piauí, visando investigar a ocorrência
    de variabilidades seguidamente de suas oscilações climáticas. Foram analisados
    os quantis referentes aos percentis de 15, 30, 65 e 85%, classificados para a
    precipitação como Muito seco, Seco, Normal, Chuvoso e Muito chuvoso; e para temperatura
    como Muito quente, Quente, Normal, Frio e Muito frio. A média anual da precipitação
    foi 982,04 mm e da temperatura foi de 33,58 °C. Dos 62 anos estudados, 56,45%
    obtiveram valores acima e 43,55% abaixo da precipitação média anual. Para temperatura,
    houve uma pequena diferença, 51,62% dos anos se mantiveram acima e 48,39% abaixo
    da média anual. O período com precipitação mais intensa ficou concentrado em dois
    períodos do ano, inicialmente de janeiro a abril e, por conseguinte, entre outubro
    e dezembro, sendo março o mês mais chuvoso. O período de estiagem apresenta as
    maiores temperaturas e se concentra nos meses de maio a setembro, sendo agosto
    o mês com menor incidência de precipitações e setembro o mais quente. Para as
    classes quantílicas de precipitação e temperatura 18 anos foram classificados
    como “Normais” (29,03%), 9 anos como “Muito secos” e “Muito quentes” (14,52%),
    13 anos como “Secos” e “Quentes” (20,97%), 13 anos classificados como “Chuvosos”
    e “Frios”, (20,97%) e 9 anos classificados como “Muito chuvosos” e “Muito frios”
    (14,52%), respectivamente. Por fim, é possível inferir que no município de Bom
    Jesus – PI predominou a ocorrência de chuvas e temperaturas acima da média e,
    em geral, os anos da série histórica analisada foram classificados como “Normais”,
    sem ocorrência de eventos climáticos extremos.
