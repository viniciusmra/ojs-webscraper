'14792':
  autores:
  - Alexandre Cardoso Lobato
  - José Antônio Herrera
  - Gabriel Alves Veloso
  data_iniciado: 08/12/2024
  id: '14792'
  resumo: Apesar da importância das unidades de conservação para a proteção e preservação
    das paisagens amazônicas, nos últimos anos, essas áreas têm sofrido constantes
    pressões antrópicas, especialmente pelo desmatamento, resultado do enfraquecimento
    das políticas ambientais no Brasil. Este trabalho analisou a dinâmica do desmatamento
    na Reserva Extrativista Verde Para Sempre (RESEX-VPS) ao longo dos últimos 19
    anos, desde sua criação, correlacionando os dados com as políticas ambientais
    e as operações de combate ao desmatamento. Os resultados indicam que aproximadamente
    23 mil hectares de vegetação natural foram desmatados, com 17% desse total ocorrendo
    entre 2019 e 2022, durante o governo Bolsonaro e a pandemia de COVID-19.
