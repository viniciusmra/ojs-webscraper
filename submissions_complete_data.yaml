'14828':
  autores:
  - Fábio Fonseca Figueiredo
  - José Gomes Ferreira
  - Bertulino José de Souza
  data_iniciado: 20/02/2025
  id: '14828'
  resumo: As políticas de ciclomobilidade têm ganhado destaque nas políticas de mobilidade
    urbana, no planejamento das cidades e nos hábitos de mobilidade circulação dos
    cidadãos. Inverter o ciclo de predomínio dos veículos motorizados e da sua apropriação
    do espaço público não tem sido uma tarefa fácil. O presente artigo tem como objetivo
    mostrar que a cidade de Natal, Rio Grande do Norte, se apresenta como uma cidade
    potencialmente hostil ao uso da bicicleta, uma vez que as políticas anunciadas
    pelo poder público municipal não efetivam a bicicleta como um meio de transporte
    relevante na cidade. Para tal, realizamos uma revisão da literatura e nela analisamos
    as ações públicas, além de dados coletados na mídia e de vivências com ciclistas
    de Natal. Evidenciamos que, embora a prefeitura anuncie ações que visem a maior
    adesão da população ao deslocamento através das bicicletas, essas mesmas ações
    fazem o ato de pedalar na cidade desestimulante; o empresariamento urbano requer
    que a mobilidade em Natal seja planejada evidenciando, cada vez mais, o deslocamento
    através de automóveis motorizados individuais e, nesse sentido, a bicicleta é
    entendida pela prefeitura como um veículo alternativo.
