'14897':
  autores:
  - Gabriela Amorim de Macedo
  - Nalanda Cecília Silva Vasconcelos
  - Rahyan de Carvalho Alves
  data_iniciado: 19/05/2025
  id: '14897'
  resumo: Este artigo analisa a inserção da educação inclusiva na formação inicial
    de professores nos cursos de Licenciatura em Geografia da Universidade Estadual
    de Montes Claros (Unimontes) e da Universidade do Estado de Minas Gerais (UEMG),
    buscando identificar se e como esses cursos promovem reflexões, práticas e conhecimentos
    alinhados às diretrizes da educação inclusiva no ensino superior. A partir da
    análise dos Projetos Pedagógicos de Curso (PPCs), investigou-se o espaço dedicado
    à temática da inclusão na estrutura curricular e os enfoques adotados nas propostas
    formativas. Os resultados evidenciam que, embora ambos os cursos contemplem disciplinas
    relacionadas à inclusão, há variações expressivas quanto à carga horária e ao
    conteúdo ofertado. Na Unimontes, a disciplina de Língua Brasileira de Sinais (Libras)
    apresenta carga horária reduzida (36 horas) e foco em conteúdos introdutórios,
    limitando a formação prática dos futuros docentes. Na UEMG, a unidade de Frutal
    oferece duas disciplinas obrigatórias — Libras e Educação Especial e Direitos
    Educacionais — com carga horária maior (72 horas cada), mas enquanto Libras carece
    de aprofundamento prático, Educação Especial apresenta conteúdo mais amplo. Na
    unidade de Carangola, a disciplina de Libras tem carga horária intermediária (60
    horas) e abrange aspectos conceituais e práticos, ainda que com limitações na
    prática. Conclui-se que, apesar dos avanços na inclusão da temática nos currículos,
    persistem lacunas relevantes quanto à carga horária e à profundidade da formação
    prática, especialmente no ensino da Libras, configurando desafios para uma formação
    docente alinhada aos princípios da educação inclusiva no ensino superior.
  revisores: []
  situacao: Em avaliação
  titulo: 'EDUCAÇÃO INCLUSIVA NO ENSINO SUPERIOR: ANÁLISE DOS PROJETOS PEDAGÓGICOS
    DO CURSO DE LICENCIATURA EM GEOGRAFIA DA UNIMONTES E UEMG'
