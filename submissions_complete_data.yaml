'14679':
  autores:
  - Caio Ricardo da Silva
  - Marcelo Martins de Moura-Fé
  - Diego Coelho do Nascimento
  data_iniciado: 02/08/2025
  id: '14679'
  resumo: O bairro do Horto destaca-se na história e na atualidade da cidade de Juazeiro
    do Norte, região Sul do Ceará. Sua realidade é também complexa, seja de uma perspectiva
    ambiental ou social, como em localidades periféricas de ambientes urbanos brasileiros.
    Essa pesquisa justifica-se pelo fato do Horto ter muitos problemas socioambientais
    não analisados, sob a ótica de um desenvolvimento sustentável. Nesse contexto,
    o objetivo desse trabalho é analisar a sustentabilidade socioambiental do bairro
    do Horto, em Juazeiro do Norte, Ceará, considerando as áreas protegidas de seu
    território. É uma pesquisa bibliográfica e documental de abordagem qualitativa,
    com sobreposição cartográfica de impactos ambientais identificados nas áreas protegidas
    do bairro, embasadas em atividades de laboratório e campo. Os resultados identificam
    impactos físicos, bióticos e antrópicos em diversos setores do bairro, inclusive
    em suas áreas protegidas. Verifica-se predominância de modificações do relevo
    local, processos erosivos, disposição inadequada de resíduos sólidos e efluentes
    líquidos, além de supressões vegetais e alterações das áreas de solo exposto.
    Tais impactos afetam de formas diferenciadas cada uma das áreas protegidas, tornando
    complexa e ainda mais necessária a busca pela sustentabilidade ambiental e urbana
    deste importante bairro juazeirense.
  revisores:
