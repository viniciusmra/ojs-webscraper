'14896':
  autores:
  - Brenda Stéfanie Bezerra
  - Leandro Vieira Cavalcante
  data_iniciado: 18/05/2025
  id: '14896'
  resumo: O artigo analisa as condições de acesso à água em comunidades rurais do
    Semiárido brasileiro, tomando como exemplo a realidade observada no Perímetro
    Irrigado Sabugi, localizado na zona rural de Caicó (Rio Grande do Norte). A pesquisa
    parte da compreensão de que os desafios hídricos da região semiárida não se restringem
    à escassez natural, mas envolvem questões políticas, técnicas e sociais relacionadas
    à gestão da água. O objetivo é discutir como a água é acessada para fins de consumo
    humano, uso residencial e produção agropecuária, a partir das dimensões de quantidade,
    qualidade e regularidade. A metodologia adotada envolveu levantamento bibliográfico
    e trabalho de campo realizado entre 2023 e 2024, com aplicação de entrevistas
    semiestruturadas e questionários a 20 moradores das agrovilas que compõem o Perímetro
    Irrigado Sabugi. A pesquisa considerou diferentes fontes de água (cisternas, dessalinizador,
    poços e rio) e avaliou a percepção da população sobre o acesso hídrico. Os resultados
    mostram que, para o consumo humano, há avanços significativos com o uso de tecnologias
    sociais, como cisternas e dessalinizador. No entanto, persistem desigualdades
    no acesso à água entre as agrovilas que compõem o perímetro irrigado, quanto à
    qualidade e regularidade da água para uso residencial. Na produção agropecuária,
    destaca-se a predominância da agricultura de sequeiro e a limitação no uso da
    irrigação devido à escassez ou irregularidade no fornecimento hídrico. Conclui-se
    que o acesso à água no Perímetro Irrigado Sabugi ainda é marcado por desigualdades
    territoriais e fragilidades na gestão hídrica.
