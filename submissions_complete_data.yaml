'14518':
  autores:
  - Reginaldo Muniz Soares
  data_iniciado: 02/08/2025
  id: '14518'
  resumo: Este artigo possui como objetivo compreender a expansão das áreas destinadas
    ao plantio de soja no Piauí, analisando sua distribuição espacial pelas Regiões
    Geográficas Intermediárias (RGInt’s) do Piauí, com recorte temporal estabelecido
    de 2012 a 2021. Os dados referentes à área plantada de soja nos municípios piauienses
    foram obtidos junto às informações disponibilizadas pelos dados da Produção Agrícola
    Municipal – PAM, obtidos através do Sistema IBGE de Recuperação Automática – SIDRA.
    Os Mapas foram elaborados no software Qgis a partir de dados cartográficos do
    IBGE (2021) e de informações cartográficas referentes a área plantada de soja
    no Piauí disponibilizadas a partir do Plug in MapBiomas no software Qgis. Somente
    a RGInt de São Raimundo Nonato, não apresentou municípios com áreas com plantio
    de soja no período analisado. A RGInt de Picos apresentou a menor evolução na
    área de soja plantada (1.200 ha), seguida pela RGInt de Parnaíba que apresentou
    uma evolução na área de soja plantada de 1.450 ha.  A RGInt de Teresina apresentou
    a terceira maior evolução na área de soja plantada (18.168 ha), e a RGInt de Corrente-Bom
    Jesus apresentou a segunda maior evolução na área de soja plantada com um total
    de 143.292 ha. A RGInt de Floriano apresentou a maior evolução na área plantada
    de soja (223.097 ha), representando 59,6% de toda a área plantada de soja no Piauí
    no ano de 2021.
