'14654':
  autores:
  - Antonio Carlos dos Santos
  - Ivanilza Moreira de Andrade
  - Gustavo Souza Valladares
  - Francílio de Amorim dos Santos
  data_iniciado: 18/02/2025
  id: '14654'
  resumo: 'No presente estudo, objetivou-se empregar um Sistema de Informação Geográfica
    (SIG) para mapear as zonas de risco de arboviroses no Território de Desenvolvimento
    dos Cocais - PI, considerando o intervalo de tempo de 2012 a 2019.Para essa finalidade,
    foi realizada uma análise ambiental e epidemiológica para geração do mapa do risco
    de ocorrência de arboviroses levando em consideração inventários envolvendo variáveis
    como infestação predial, temperatura média, pluviometria, umidade relativa do
    ar, NDVI e NDWI por geoprocessamento e sensoriamento remoto. Os temas foram sobrepostos
    e analisados por meio do método multicritério aditivo para a elaboração do mapa
    de risco de ocorrência das doenças. Posteriormente, os óbitos registrados foram
    sobrepostos com o intuito de validar a metodologia proposta. O mapeamento de risco
    para transmissão de arbovirosesresultou na identificação de três classes: média,
    alta, e muito alta,sendo que as classes alta e muito alta o risco de ocorrência
    de óbitos teve maior destaque.Cerca de 75% dos óbitos ocorreram em municípios
    em áreas de risco "Muito Alta" (Matias Olímpio, Pedro II e Piripiri), enquanto
    25% dos óbitosocorreram em área de risco "Alta" (Piracuruca). Além disso, 84%
    dos municípios com incidências cumulativas elevadas estão em áreas de risco "Muito
    Alta" ou "Alta".Os resultados sugerem que o modelo do método multicritério aditivo
    para determinar áreas de ocorrência de casos de dengue, chikungunya e zika vírus
    é altamente eficiente, indicando que os fatores entomológicos e ambientais elegidos
    para compor as análises apresentaram resultado satisfatório.'
