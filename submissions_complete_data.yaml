'14428':
  autores:
  - Osiel César Trindade Junior
  - Edna Maria Ferreira Chaves
  - Roseli Farias Melo de Barros
  data_iniciado: 17/01/2024
  id: '14428'
  resumo: Evolutionary Ethnobiology (EE) integrated with Ethnobotany allows the retrieval
    of cultural knowledge and memories about food plants consumed in rural communities
    in Brazil. The objective of this study was to survey and analyze the Ethnobotanical
    knowledge of rural farmers in the Barra do Saco community, in the municipality
    of Codó, Maranhão, as well as identify and describe the wild food plants consumed
    in the community. Thirty-five residents over 18 years old who are part of a group
    of associates (29 women and six men) were interviewed using semi-structured forms.
    The Knowledge Mesh method was used to evaluate the consensus among informants
    on the knowledge and use of food plants. The speeches were presented based on
    EE studies analyzing the retrieval of memories. The age range was from 24 to 82
    years. There was a predominance of females and low educational level among the
    interviewees (68%). The majority of interviewees have lived in the community for
    20 and 30 years, and time of residence was a relevant factor for information and
    identification of plants in the region. Individual and collective knowledge are
    shared dynamically among generations, arising from accumulations processed in
    space and time. Three hundred and fifty-two (352) citations of wild food plants
    were recorded, and Hibiscus sabdariffa L. (vinagreira) and Euterpe precatoria
    Mart. (açaí) had higher relative citation frequency (CRF = 1.67). In the perception
    of farmers, these species have been used as food by families throughout many generations
    and the knowledge is passed on from parents to other family members. The Barra
    do Saco community knows and uses wild food plants, highlighting the importance
    of retrieving evolutionary memory and Ethnobotanical knowledge. Knowledge must
    be built in order to intensify information for survival and sustainability in
    rural environments, in addition to allowing the rescue of botanical memories associated
    with traditions and habits in rural communities.
