    comentarios: O artigo proposto possui uma temática relevante quanto na conjuntura
      atual. Apresenta uma leitura de fácil compreensão, texto fluído, necessitando
      de poucas inserções. O referencial teórico utilizado apresenta boa consistência.
      O percurso metodológico e as seções que o constitui estão articuladas. A conclusão
      apresenta uma boa síntese da discussão apresentada. Quanto as questões de ortografia,
      está bem redigido, feito poucas inserções. Outras observações constam no arquivo
      em anexo. É preciso rever pontos referentes as normatizações, nas referências
      – ABNT (inserções foram indicadas no arquivo).Para tanto, o artigo foi aprovado
      com pequenas ressalvas e correções pontuais, conforme observações feitas no
      corpo do trabalho.   Desde já agradeço pela oportunidade em contribuir com esta
      pesquisa.
