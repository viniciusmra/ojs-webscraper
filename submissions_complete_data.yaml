'14856':
  autores:
  - Joiada Moreira da Silva Linhares
  - Ester Dos Reis Silva
  data_iniciado: 20/03/2025
  id: '14856'
  resumo: O educando, ao participar do Exame Nacional do Ensino Médio (ENEM), para
    ser aprovado tem que dominar a linguagem da matemática, da computacional e das
    representações gráficas. Neste contexto, o estudo teve o objetivo de analisar
    a linguagem cartográfica utilizada na leitura e na interpretação de imagens de
    SR, presentes em Livros Didáticos de Geografia (LDG) do Ensino Médio (EM). O estudo
    teve como método a análise documental. Foram selecionadas oito coleções de LDG
    do 1º ano do EM sendo, quatro LDG do PNLD / 2018 e quatro LD de Ciências Humanas
    e Sociais Aplicadas (CHSA) do PNLD/ 2021. No Vol. I do LDG do PNLD/2018 identificou-se
    309 representações cartográficas, das quais 88,90% são mapas e 10,10% imagens
    de SR. No vol. I dos LD de CHSA do PNLD/2021, observaram-se 83 representações,
    das quais 89,6 % são mapas e 1,20% imagens de SR. O conteúdo de linguagem cartográfica
    associado à leitura e à interpretação de imagens de SR foi suprimido do vol. I
    dos LD de CHSA do PNLD/2021, fato que compromete o ensino e a aprendizagem de
    linguagem cartográfica do educando, em especial o conteúdo de SR entre outras
    áreas do conhecimento que integram as geotecnologias.
