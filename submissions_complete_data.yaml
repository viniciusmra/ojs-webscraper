'14915':
  autores:
  - Andréia Cardoso de Souza
  data_iniciado: 09/06/2025
  id: '14915'
  resumo: O artigo aborda a importância da água como recurso essencial à vida, destacando
    seu papel na saúde, agricultura e manutenção dos ecossistemas. No contexto do
    semiárido brasileiro, especialmente no Nordeste, a escassez hídrica é um desafio
    histórico, agravado pelas condições climáticas e pelo uso inadequado do solo.
    A localização do semiárido, marcada por baixa pluviosidade e altas taxas de evaporação,
    torna os reservatórios estratégicos para o armazenamento e abastecimento da população.
    O estudo tem como foco o Açude Angicos, localizado na bacia hidrográfica do Coreaú,
    no estado do Ceará. Esses reservatórios, contudo, sofrem com processos de degradação,
    como assoreamento e eutrofização. A qualidade da água está diretamente ligada
    a atributos físicos, químicos e biológicos, como pH, turbidez, nutrientes e presença
    de microrganismos. A metodologia adotada foi a matriz de Leopold, utilizada para
    avaliar os impactos ambientais associados ao uso do reservatório. O artigo ressalta
    a necessidade de monitoramento constante e gestão participativa. Políticas públicas
    eficazes são essenciais para assegurar o acesso à água de qualidade no semiárido.
