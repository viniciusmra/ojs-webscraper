'14715':
  autores:
  - Leandro Bruno Santos
  - Adonis Azeredo Siqueira
  data_iniciado: 18/02/2025
  id: '14715'
  resumo: A partir de 2004, as mudanças nos marcos regulatórios da política habitacional
    brasileira permitiram que as grandes construtoras e incorporadoras ampliassem
    seus capitais. O Programa Minha Casa Minha Vida (PMCMV), de viés mercadológico
    e com facilitação do acesso ao crédito, fortaleceu os nexos da financeirização
    com a produção da moradia. Este trabalho visa compreender as lógicas e estratégias
    espaciais de atuação da MRV&Co na cidade de Campos dos Goytacazes (RJ) entre os
    anos 2010 e 2022. A metodologia adotada compreendeu a compilação bibliográfica,
    a coleta de dados secundários, o levantamento e a análise documental, a observação
    sistemática e a sistematização e análise dos dados. A concentração de terras,
    os excedentes do petrorrentismo e a instalação do Porto do Açú favoreceram expansão
    do capital financeirizado na produção de moradias em Campos dos Goytacazes. Até
    o ano de 2020, 5.912 unidades habitacionais foram construídas pela MRV&Co e distribuídas
    em 13 empreendimentos verticais da linha parque. Os empreendimentos imobiliários
    foram construídos nos bairros periféricos da cidade, situando-se em locais que
    permitem acessibilidade às principais vias de circulação, ao centro histórico
    e a centralidades comerciais e de serviços.
