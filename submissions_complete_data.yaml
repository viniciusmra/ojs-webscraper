  data_iniciado: 27/09/2023
  id: '14339'
  resumo: Durante a época da Grande Aceleração em que vivemos, quando os geossistemas
    apresentam substanciais alterações devido o denominador humano, são imprescindíveis
    propostas de intervenções que visem mitigar as ações catastróficas dos seres humanos
    sobre os sistemas da Terra. Dessa forma, o presente trabalho objetiva apresentar
    a importância da implantação dos conceitos agroecológicos tropicais para conservação
    dos recursos naturais e mitigação dos efeitos periclitantes do Antropoceno; tendo
    como recorte espacial de análise, os municípios do Território de Identidade Baixo
    Sul, no Estado da Bahia, Brasil. Foram produzidas tabelas de uso e cobertura do
    solo – em hectares (ha) - dos municípios estudados, a partir de dados da Coleção
    6 (MAPBIOMAS, 2020). Foi realizada uma análise visual dos dados obtidos.
