'14572':
  autores:
  - Silvia Letícia Costa Pereira Correia
  - Natanael Reis Bomfim
  - Marcelo de Jesus Arouca
  data_iniciado: 27/12/2024
  id: '14572'
  resumo: 'Este artigo, resultado de reflexões tecidas a partir dos resultados de
    pesquisas de Mestrado e Doutorado, sobre a relação curricular com o espaço da
    favela, teve o objetivo de discutir sobre a importância do reconhecimento e da
    valorização da inserção das práticas socioculturais e dos saberes produzidos no
    cotidiano das favelas, para a construção de currículos, pensados enquanto redes
    de conhecimentos, comprometidos com a emancipação e consequente transformação
    social. Parte da seguinte questão: “de que maneira os cotidianos das favelas e
    suas práticas socioculturais contribuem para a construção de um currículo com
    vistas à emancipação?”. Muito embora este artigo seja teórico, foi originado de
    pesquisas com aporte teóricometodológico orginalmente qualitativo, em que foram
    utilizados entrevista, entrevista com grupo focal, produção de mapas afetivos,
    técnica de associação livre de palavras. A partir do diálogo com diversos interlocutores
    e interlocutoras como Alves (2002), Arouca (2017; 2020), Certeau (2014), Correia
    (2020), Freire (2001), Maricato (1982), entre outros e outras, recomenda-se que
    as escolas busquem construir junto às suas comunidades, perspectivas curriculares
    que se comprometam com a proposição de reflexões acerca do contexto social, no
    sentido de problematizar as contradições e limites presentes nos cotidianos das
    favelas, bem como as potencialidades manifestas nas práticas socioculturais dos
    praticantes, objetivando encontrar formas de contribuir para a construção de alternativas
    de superação das demandas que se apresentam, evidenciadas nas práticas socioculturais
    cotidianas.'
  revisores:
  - arquivo_revisor: null
    comentarios: Texto traz interessante tema e perspectiva defendida, numa abordagem
      qualitativa. No entanto e apesar de ser resultado de pesquisas de Mestrado e
      Doutorado, traz embutido esclarecendo que compuseram o recorte metodologico
      o uso de "entrevista com grupo focal, produção de mapas afetivos, técnica de
      associação livre de palavras" e curiosamente nao aparecem no texto e como tal,
      ao nosso vê, desconfigura o que é proposto, pois, para alem do qualitativismo
      referendado em autores base, a amostragem do objetivado deixa margens de outras
      interpretacoes pela ausencia em tela.
    data_arquivo_revisor: null
    data_recomendacao: 27/11/2024
    nome: Juscelino Lima
