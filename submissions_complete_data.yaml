'14742':
  autores:
  - Livânia Norberta Oliveira
  - Ronivaldo Marcelino Santos
  data_iniciado: 02/08/2025
  id: '14742'
  resumo: A região amazônica possui rica geodiversidade pouco pesquisada. Diante disso,
    esta pesquisa tem como objetivo propor uma rota turística de cachoeiras a partir
    do levantamento de dados sobre a geodiversidade do município de Medicilândia,
    no Sudoeste do Pará. Tais informações foram geradas através de visitas de campo
    realizadas entre os meses de agosto e outubro de 2023, com apoio da Secretaria
    de Turismo de Medicilândia. A partir da caracterização geoambiental do município
    e mapeamento da área, verificou-se que essa rota poderá fornecer interação da
    sociedade com a biodiversidade e a cultura local, com possibilidade de promoção
    da bioeconomia. Além disso, essa iniciativa pode diversificar a oferta do turismo
    no município e na Transamazônica Paraense, bem como propõe a Rota do Cacau ao
    chocolate, agregando valor ao geoturismo, com fins de bioeconomia e geoconservação
  revisores:
