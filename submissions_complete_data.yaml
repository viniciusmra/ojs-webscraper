'14633':
  autores:
  - Maria Ivaneide Luz
  - Carlos Alberto Isaza Valencia
  - Cledinaldo Borges Leal
  data_iniciado: 17/02/2025
  id: '14633'
  resumo: 'Os Serviços Ecossistêmicos Culturais (SEC) representam os benefícios intangíveis
    que o meio ambiente oferece à humanidade, como recreação, apreciação, expressão
    cultural, espiritualidade. Suas características dificultam seu estudo e mensuração.
    Nesse sentido, as informações publicadas nas redes sociais (imagens, vídeos) por
    visitantes de áreas protegidas têm sido utilizadas por pesquisadores para compreender
    o uso dos SEC. Assim, a presente pesquisa estabeleceu como objetivo:   analisar
    os SEC oferecidos por Unidades de Conservação (UC) Federais de diferentes categorias
    e localizadas em biomas distintos. Para tanto, foram analisadas fotografias publicadas
    entre os anos de 2013 e 2019, na rede social Instagram, por visitantes de quatro
    UC:  Área de Proteção Ambiental (APA) da Barra do Rio Mamanguape, APA Chapada
    do Araripe, Reserva Extrativista (RESEX) Acaú-Goiana e Parque Nacional (PARNA)
    de Sete Cidades. Essas unidades estão distribuídas em dois tipos de ecossistema:
    Caatinga e Litoral. Os critérios adotados para a classificação das categorias
    dos SEC foram adaptados de Retka et al. (2019). O bioma litorâneo apresentou um
    padrão semelhante no uso dos SEC para as duas UC estudadas, no qual a modalidade
    Apreciação da Paisagem se destaca expressivamente. Para o bioma Caatinga, os resultados
    revelaram as peculiaridades de cada unidade: na APA Chapada do Araripe, há predominância
    da modalidade Apreciação da Natureza; no PARNA de Sete Cidades a modalidade Estruturas
    Naturais e Monumentos, destacou-se pela beleza cênica da área.'
  revisores:
  - arquivo_revisor: Patrícia_Araújo_14633-55055-1-RV.docx
