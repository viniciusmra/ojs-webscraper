'14554':
  autores:
  - Marco Aurélio da Silva Lira Filho
  - Mauro César de Brito Sousa
  data_iniciado: 02/08/2025
  id: '14554'
  resumo: Esta pesquisa visa desenvolver um mapeamento da vulnerabilidade natural
    à contaminação de aquíferos em Teresina - PI, utilizando o método GOD, desenvolvido
    por Foster e Hirata (1993). Para alcançar esse objetivo, elaborou-se um banco
    de dados geográfico com informações hidrogeológicas de 80 poços, incluindo dados
    sobre o confinamento dos aquíferos, estratos geológicos, características litológicas
    e o nível da água subterrânea em relação à superfície. Os principais resultados
    incluem a elaboração do mapa da vulnerabilidade natural à contaminação de aquíferos,
    construído por técnicas de análise espacial e com o auxílio de um Sistema de Informação
    Geográfica (SIG). Os resultados revelam que a maior parte do território de Teresina
    está classificada como de baixa vulnerabilidade, com a região central mostrando
    maior suscetibilidade, devido à sua classificação como média vulnerabilidade.
    Assim, esta pesquisa fornece fundamentos para um ordenamento territorial mais
    eficaz e uma gestão ambiental mais assertiva, visando prevenir potenciais riscos
    de contaminação do aquífero.
  revisores:
  - arquivo_revisor: Roneide_Sousa_14554-54787-1-RV.doc
    comentarios: O artigo intitulado "Vulnerabilidade Natural à Contaminação dos Aquíferos
      na Cidade de Teresina – Piauí" apresenta uma contribuição relevante para a pesquisa
      em Geografia, fornecendo informações importantes para a tomada de decisões,
      ao espacializar áreas com potencial vulnerabilidade natural à contaminação.
      As sugestões de melhoria estão presentes no corpo do texto. Destaca-se a necessidade
      de uma melhor contextualização da problemática de pesquisa na introdução, bem
      como uma justificativa mais clara para o desenvolvimento do estudo. O texto
      inclui figuras e quadros que não são adequados à introdução, além de elementos
      que podem ser ajustados nos procedimentos metodológicos. O objetivo geral precisa
      ser padronizado tanto no resumo quanto na introdução, além de apresentar cores
      de fonte distintas. As figuras devem ser posicionadas o mais próximo possível
      das suas respectivas chamadas, e a conclusão carece de mais elementos que vislumbrem
      as contribuições da pesquisa para o recorte analisado. Por fim, sugere-se que
      as correções necessárias sejam realizadas para que o artigo possa ser posteriormente
      publicado.
