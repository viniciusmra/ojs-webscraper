'14955':
  autores:
  - Thais Costa Medeiros
  - Bartira Araújo da Silva Viana
  data_iniciado: 31/07/2025
  id: '14955'
  resumo: 'A inclusão de estudantes com deficiência no ensino regular, teve como marco
    fundamental para sua efetivação a Constituição de 1988 e a Lei de Diretrizes e
    Bases da Educação Nacional de 1996, que estabeleceram a educação de estudantes
    com deficiência na rede regular de ensino. Frente a essa realidade nos cabe discutir,
    como o ensino de geografia para estudantes com deficiência visual, tem se efetivado
    em sala de aula, considerando as experiencias dos professores de geografia, frente
    a esse público. Para tanto, foi necessário realizar uma revisão teórica em autores
    que versam sobre a temática, como: Carmo (2011); Loch (2008), Medeiros e Sousa
    (2019); Sena e Carmo (2013); Vasconcellos (1993), entre outros. Além disso, foi
    realizado a aplicação de um questionário aos professores de geografia, com o intuito
    de conhecer as estratégias e concepções dos professores com a presença de estudantes
    com deficiência visual em sala de aula. Com a pesquisa, foi possível compreender
    os desafios e a vivência em sala de aula com estudantes desprovidos do sentido
    da visão e das práticas inclusivas realizadas em classe para que a inclusão se
    efetive em sala de aula. PALAVRAS-CHAVE: Geografia. Professores. Estudantes com
    Deficiência Visual.'
