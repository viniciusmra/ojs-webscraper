'14455':
  autores:
  - Rafael da Silva Paiva
  - Reinaldo Matheus Reis Ribeiro
  - Maria Isabel Vitorino
  data_iniciado: 16/02/2024
  id: '14455'
  resumo: A castanha-do-pará é uma espécie nativa do Brasil, desempenhando um papel
    fundamental na economia local e na conservação da biodiversidade. Na região norte,
    a castanha-do-pará merece atenção, pois é fonte de renda para inúmeras comunidades.
    Entretanto, seu extrativismo enfrenta desafios como questões ambientais e climáticas,
    incluindo o crescimento da fronteira agropecuária e a variabilidade do regime
    de precipitação. Portanto, tendo em vista a importância da castanha-do-pará e
    a influência direta da variabilidade da precipitação e da mudança no uso e cobertura
    do solo na agricultura, buscou-se compreender como esses fatores podem estar afetando
    a produtividade agrícola da castanha-do-pará no município de Acará no período
    de 2016 a 2021. Para a caracterização do uso e cobertura do solo, foram utilizados
    dados do Mapbiomas, enquanto para a análise da precipitação espacial e temporalmente,
    no município de Acará, foi utilizado um conjunto de dados de precipitação CHIRPS.
    Esses dados foram extraídos e processados no GrADS. Para a análise do desenvolvimento
    da produção agrícola na região de estudo, foram obtidos dados do Instituto Brasileiro
    de Geografia e Estatística (IBGE). Durante o período analisado no estudo, foi
    observada uma redução da área de formação florestal, indicando a vulnerabilidade
    ambiental da região. Em relação à precipitação anual, é possível observar que,
    no ano de 2016, a distribuição da precipitação variou entre 2800 e 3000 mm, enquanto
    no ano de 2021, grande parte da distribuição da precipitação ficou entre 3000
    e 3400 mm. A produção agrícola no município de Acará, no Pará, se destaca como
    a principal atividade econômica da região. As mudanças no uso e cobertura do solo,
    juntamente com as variáveis climatológicas, especialmente a precipitação, podem
    ser, entre outros fatores, as principais causas da diminuição da produtividade
    agrícola da castanha-do-pará no município.
