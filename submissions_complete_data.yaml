'14748':
  autores:
  - Jefferson Paulo Ribeiro Soares
  data_iniciado: 03/08/2025
  id: '14748'
  resumo: O presente trabalho tem o intuito de analisar como a manifestação religiosa
    cristã protestante neopentecostal, em específico a denominação Igreja Universal
    do Reino de Deus, tem contribuído para o processo de integração socioespacial
    dos afro-brasileiros na cidade de Teresina-PI. Tendo em vista que, para este segmento
    da sociedade brasileira, durante muito tempo — ao longo do período de vigência
    da escravidão no Brasil — o território brasileiro se constituiu como um 'não-lugar',
    onde a expressão cultural, religiosa e intelectual dos afro-brasileiros era negada.
    Mesmo após o fim da escravidão, o processo de negação e marginalização socioespacial
    perdurou, e em certa medida ainda persiste até os dias atuais. Porém, algumas
    vertentes do protestantismo, em especial o pentecostalismo e o neopentecostalismo,
    ao se difundirem no Brasil, provocaram uma integração socioespacial para os afro-brasileiros,
    ao estabelecerem suas igrejas nas áreas periféricas, locais onde majoritariamente
    vivem negros e pardos. Foi possível constatar que, apesar dessa inclusão socioespacial
    promovida pelas igrejas, há a necessidade de ações mais efetivas no enfrentamento
    do racismo, como a criação de uma rede de apoio e amparo àqueles que sofrem ou
    já sofreram com a discriminação racial dentro da comunidade religiosa. A atuação
    dessas igrejas no combate a esse problema social é crucial, tendo em vista sua
    capilaridade e massiva presença nas áreas periféricas.
