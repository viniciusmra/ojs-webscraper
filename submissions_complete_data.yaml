'14916':
  autores:
  - Dyego Anderson Silva Pereira
  data_iniciado: 13/06/2025
  id: '14916'
  resumo: A Educação Inclusiva no Brasil está amparada por um conjunto legal abrangente,
    desde a Constituição Federal até a Lei nº 12.764/2012, específica para pessoas
    com autismo. Este artigo busca dialogar com essa estrutura normativa, analisando
    as práticas educacionais a partir de uma pesquisa realizada durante o mestrado
    sobre o ensino de Geografia para alunos com Transtorno do Espectro Autista (TEA).
    Nossa investigação, baseada em revisão bibliométrica e pesquisa empírica, revela
    que o processo de ensino-aprendizagem com autistas demanda abordagens específicas,
    considerando suas singularidades sensoriais, perceptivas e atitudinais. A escassa
    produção acadêmica sobre o tema no Portal de Periódicos da Capes reforça a relevância
    deste estudo. Os resultados demonstram que estratégias lúdicas, como jogos adaptados,
    podem potencializar o aprendizado em Geografia para alunos com TEA, além de promover
    interações significativas entre estudantes com e sem deficiência, reduzindo barreiras
    comunicacionais e atitudinais. A experiência evidencia a necessidade de articular
    formação docente, referencial teórico e práticas pedagógicas inclusivas para efetivar
    os princípios da educação inclusiva.
  revisores: []
  situacao: Em avaliação
  titulo: 'ENSINO DE GEOGRAFIA PARA ALUNOS COM AUTISMO: JOGOS DIDÁTICOS COMO INSTRUMENTO
    PARA UMA EDUCAÇÃO INCLUSIVA'
  versao_autor: []
  versao_avaliacao: 14916-55285-1-RV.docx
'14919':
  autores:
  - Luiz Martins Junior
  - Douglas Bressan
  data_iniciado: 27/06/2025
  id: '14919'
  resumo: Este artigo analisa os desafios e as potencialidades de algumas professoras
    de Geografia na prática da educação inclusiva de uma escola estadual catarinense.
    A pesquisa qualitativa de natureza exploratória, realizada em 2024, envolveu cinco
    professoras de Geografia do Ensino Médio em uma escola pública do nordeste catarinense.
    Os resultados indicam que, os docentes de geografia não desconhecem o que é a
    inclusão, mas a inclusão exige estudos teóricos e práticos, logo, a formação continuada
    cumpre papelcrucial para atender essa lacuna formativa. Destacaram que, os materiais
    adaptados são os maiores aliados do processo de consolidação dos saberes geográficos
    e a avaliação no contexto da inclusão é necessária e precisa ser individualizada,
    mas essa prática não caracteriza como um ato excludente. Por fim, ressaltaram
    que, sem a parceria do profissional da Educação especial não se faz inclusão,
    mas o desafio de planejar com este profissional está posto.
  revisores: []
  situacao: Em avaliação
  titulo: A PERCEPÇÃO DO DOCENTE DE GEOGRAFIA SOBRE A INCLUSÃO NO ENSINO MÉDIO EM
    UMA ESCOLA ESTADUAL CATARINENSE
