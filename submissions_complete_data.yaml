'14811':
  autores:
  - Rafael Martins Brito
  - Adalto Moreira Braz
  - Amanda Moreira Braz
  data_iniciado: 03/01/2025
  id: '14811'
  resumo: O sistema Nacional de Unidades de Conservação (SNUC) estabelece critérios
    e normas para criação, implementação e gestão das Unidades de Conservação (UC),
    onde as 12 categorias de unidades distribuídas dentro dos grupos de proteção integral
    e uso sustentável dispõe de níveis de restrição com usos diretos e indiretos.
    Por sua vez, as Áreas de Proteção Ambiental (APA), em habitualmente implementadas
    em grandes extensões territoriais, apresentam graus significativos de alterações
    antrópicas dos quais se interpõem aos próprios princípios de proteger a diversidade
    biológica e assegurar a sustentabilidade do uso dos recursos naturais, priorizando
    disciplinar o processo de ocupação. Sendo assim, buscou-se analisar através das
    características de transição do Uso e Cobertura da Terra (UCT) a abrangência,
    dinâmica e importância de um mosaico constituído por sete grandes APA no nordeste
    do estado de Mato Grosso do Sul. Para tanto, utilizou-se os dados multitemporais
    do projeto MapBiomas manipulados em ambiente SIG em conjunto com a revisão de
    documentos relevantes ao tema.  Os resultados indicam não haver relação substancial
    entre a criação do mosaico de APA e a redução da supressão da vegetação nativa
    na região. Tampouco foi possível apontar ações claras e concretas à nível de gestão
    para regressão deste cenário, seguindo uma tendência estadual e nacional que reproduzem
    o padrão de criação de extensas APA. Ademais, considera-se que fatores como disposição
    territorial, extensão, atividades exercidas/permitidas e articulação entre as
    unidades do sistema, influenciam diretamente no êxito de seus objetivos. Sendo
    assim, sugere-se a alocação de esforços em UC já existentes e/ou mais restritivas
    com menores extensões, como alternativa potencialmente mais eficiente para esta
    região de Mato Grosso do Sul. Por fim, considera-se que o enfoque em espaços reduzidos
    e melhor articulação entre gestões das UC do mosaico podem tornar as ações planejadas
    mais exequíveis.
