'14787':
  autores:
  - Fábio Soares Guerra
  - Maria Rita Vidal
  - Edson Vicente da Silva
  data_iniciado: 03/12/2024
  id: '14787'
  resumo: 'A análise ambiental por meio da Geoecologia das Paisagens, uma ciência
    ambiental interdisciplinar, é capaz de fornecer os subsídios necessários para
    o ordenamento e a gestão territorial. Em vista disso, a presente pesquisa teve
    por objetivo identificar, cartografar e analisar as unidades geoecológicas do
    município de Fortim, para a partir disso construir uma proposta de zoneamento
    geoecológico e a projeção de cenários paisagísticos como instrumentos para equalizar
    o uso e ocupação do território com a possibilidade de um desenvolvimento sustentável
    de base local. A metodologia empregada seguiu os fundamentos da análise geoecológicas,
    a saber: organização e inventário, análise, diagnóstico e proposição. Foram realizados
    trabalhos de campo, a elaboração de cartografia temática e estudos de gabinete
    para interpretação e explanação dos resultados.  Como resultados foram identificadas
    e analisadas em Fortim sete unidades geoecológicas, a partir de então foi possível
    elaborar o zoneamento geoecológico que contemplou quatro zonas:  Zona de Preservação
    Permanente, Zona de Conservação Ambiental, Zona de Interesse Turístico e Zona
    de Uso Disciplinado. Foi possível também, por meio da análise da evolução espaço-temporal
    da paisagem, a construção e espacialização de cenários paisagísticos tendenciais
    e propositivos para Fortim, com o intuito de fundamentar o ordenamento e a gestão
    do território. Conclui-se que Fortim apresenta grande potencialidade paisagística,
    contudo, os usos e ocupações empregados tem comprometido a capacidade de carga
    e suporte das unidades geoecológicas. Portanto, o zoneamento geoecológico e a
    projeção de cenários paisagísticos apresentaram-se como ferramentas adequadas
    para alicerçar o ordenamento e a gestão territorial.'
