'14941':
  autores:
  - Regiane Leal
  - Fabiane Machado Vezzani
  data_iniciado: 22/07/2025
  id: '14941'
  resumo: 'Investigamos o uso do solo em rituais de benzeção e terapias integrativas
    por benzedeiras e terapeutas no Paraná, por meio da escuta e do acolhimento desses
    conhecimentos empíricos para a construção do conhecimento científico sobre novas
    perspectivas das funções do solo para a humanidade. O método bola de neve identificou
    23 participantes: 9 benzedeiras e 14 terapeutas. As entrevistas semiestruturadas
    foram submetidas à Análise de Conteúdo, categorizando os dados em: 1) História
    do uso; 2) Solos utilizados; e 3) Usos do solo, organizados por palavras-tema
    e frequências relativas. Os resultados mostraram que o uso do solo foi relacionado
    ao respeito e cuidado, influenciados por tradições familiares e cursos de práticas
    integrativas. O solo mais utilizado foi o argiloso (69,6%), seguido pelo franco-arenoso
    (8,7%) e arenoso (4,4%). Os locais de coleta variaram entre mata virgem (56,5%),
    áreas livres de contaminação (17,4%), lugares sagrados (17,4%), quintais (13%),
    barrancos (13%), cupinzeiros (4,4%) e compra em lojas (26,1%). As aplicações foram
    para tratar dores (60,9%), infecções e inflamações (56,5%), problemas de pele
    (56,5%), digestivos (43,5%), reumáticos (43,5%) e até câncer (30,4%). As formas
    de uso incluíram emplastros (100%), chás (65,2%), ingestão (26,1%), aterrar o
    corpo (17,4%) e descarregar energias (13%). Houve combinações do solo com ervas
    medicinais (78,3%), óleos vegetais (17,4%), carvão (13%), urina (8,7%), própolis
    (4,4%) e outros ingredientes. Cuidados no preparo incluíram tecidos para aplicação,
    exposição ao sol ou à lua, água sem cloro, aquecimento em banho-maria e dietas
    específicas. O estudo evidenciou a função do solo para a saúde humana, refletindo
    uma visão ancestral e integrativa, que une respeito à natureza e práticas de cura
    tradicionais.'
