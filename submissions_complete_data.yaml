'14659':
  autores:
  - Jaelson Lopes
  - Alda Araújo
  - Cláudia Aquino
  data_iniciado: 17/02/2025
  id: '14659'
  resumo: 'Esta pesquisa visou analisar a relação entre a geodiversidade e as atividades
    econômicas nos municípios de Lagoa do Piauí, Monsenhor Gil, Amarante, Floriano,
    Guadalupe, Alvorada do Gurguéia e Bom Jesus. O percurso metodológico do presente
    trabalho seguiu as seguintes etapas: a) pesquisa bibliográfica; b) realização
    de trabalhos de campo; c) compilação e análise dos dados; d) síntese dos dados
    coletados e elaboração de mapas. Viu-se que a geodiversidade nos municípios é
    bastante variada e rica, e que o conhecimento, o estudo e o investimento nos aspectos
    físicos naturais desses locais se faz pertinente, haja vista que por meio desses
    saberes podem ser feitos diversos usos com via econômica, objetivando auxiliar
    no crescimento econômico desses municípios. O estudo ressaltou a importância de
    um levantamento mais detalhado sobre os aspectos físicos naturais desses locais,
    a fim de orientar investimentos adequados que possam contribuir para o crescimento
    econômico dos municípios, considerando a geodiversidade com suas potencialidades
    e limitações impostas. A partir da geodiversidade brevemente caracterizada neste
    estudo constatou-se o potencial destes municípios para o geoturismo. Destaca-se
    a relevância de estudos de levantamento do geopatrimônio destes municípios para
    fins geoturísticos, contudo, faz-se necessário investimento em pesquisa, e ainda,
    em capacitação da população local visando a promoção do potencial econômico, científico,
    estético e cultural desses locais.'
  revisores:
  - arquivo_revisor: null
    comentarios: O trabalho apresenta potencial para publicação, desde que considere
      algumas sugestões.Cabe, também, uma revisão textual antes do envio do trabalho
      final.
    data_arquivo_revisor: null
