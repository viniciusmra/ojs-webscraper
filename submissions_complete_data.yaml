'14928':
  autores:
  - Marcelo Henrique de Souza
  - Fabiano Eduardo de Souza
  data_iniciado: 08/07/2025
  id: '14928'
  resumo: 'O presente artigo propõe uma abordagem geográfica de gestão compartilhada
    dos serviços ecossistêmicos nos municípios que fazem parte do Plano de Manejo
    (PM) do Parque Nacional do Caparaó (PNC), lado Capixaba. Este modelo de gestão
    envolve: funcionários públicos, privados, autônomos, empreendedores e stakeholders.
    O Sistema de Gestão Ambiental (SGA), com base no ciclo Plan-Do-Check-Act (PDCA),
    dará o direcionamento organizacional aos gestores públicos dos municípios nas
    práticas de recomposição florestal. Estes municípios carecem de alternativas socioambientais
    que possam reduzir os impactos ambientais causados pelos setores da economia,
    especialmente o agropecuário. A pesquisa é de natureza qualitativa com enfoque
    exploratório e descritivo, sendo fundamentada em levantamento bibliográfico e
    documental, utilizou-se o geoprocessamento para a elaboração de mapas específicos
    da região, além da plataforma da Empresa Brasileira de Pesquisa Agropecuária (Embrapa)
    para a simulação da recomposição florestal em uma área dentro do recorte espacial
    da pesquisa. O objetivo principal desta pesquisa foi compreender por meio de múltiplas
    fontes, se as dinâmicas socioambientais relacionadas aos serviços ecossistêmicos
    carecem de gerenciamento ambiental. Os resultados elencados via geoprocessamento
    mostraram que as formas de uso e ocupação do solo na região está provocando inúmeros
    impactos ambientais. Conclui-se que após a simulação realizada de recomposição
    florestal em uma área degradada pela pecuária, junto com a ferramenta organizacional
    (SGA/PDCA) proposto, resultará em um curto período entre 2 a 10 anos que os impactos
    ambientais nos municípios sejam mitigados. Esta ferramenta dará sinergias às políticas
    públicas na região.'
