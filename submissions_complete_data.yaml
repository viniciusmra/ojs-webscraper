'14820':
  autores:
  - Alessandra Braúna de Meireles
  data_iniciado: 29/01/2025
  id: '14820'
  resumo: 'Inicialmente, a paisagem era compreendida somente sob uma vertente de aspectos
    físicos – a paisagem natural. Contudo, por intermédio do trabalho de alguns autores,
    especialmente do campo da Geografia, passou-se a considerar os aspectos culturais
    decorrentes da ação humana. Assim, surge a paisagem cultural, que abarca de forma
    mais ampla os elementos dessa relação homem-meio. Esta pesquisa teve como objetivo
    geral realizar um estudo com enfoque sobre a temática da paisagem cultural no
    âmbito da Beira Rio, na cidade de Parnaíba, Piauí, com o propósito de contribuir
    com o levantamento de indicativos de valor cultural nesse espaço. O trabalho contou
    com os seguintes objetivos específicos: abordar os principais conceitos de paisagem
    à luz das ciências Geografia, Arquitetura e Turismo; identificar algumas dimensões
    de análise sobre a preservação da paisagem cultural dispostas na legislação patrimonial;
    e, apresentar o caso da Beira Rio, destacando algumas camadas visíveis, e equiparando
    com as diretrizes do Plano Diretor do município. A pesquisa seguiu o método fenomenológico,
    com caráter exploratório e descritivo, e foi desenvolvida em três partes: primeiramente,
    apresentou-se uma abordagem teórica, à luz das ciências supracitadas; em seguida,
    buscou-se fazer uma exposição das classificações encontradas em fontes literárias
    sobre paisagem, no que se refere aos valores atribuídos e às suas dimensões, bem
    como das principais referências de legislação patrimonial concernentes à paisagem
    cultural; por fim, a terceira parte apresentou como estudo de caso o recorte espacial
    da Beira Rio, buscando identificar, por intermédio de figuras, de mapas e de registros
    fotográficos realizados ao longo da Av. Nações Unidas, alguns de seus valores
    e de seus aspectos físicos. Portanto, o principal interesse quanto ao desenvolvimento
    dessa pesquisa foi lançar luz ao objeto de estudo na perspectiva de paisagem cultural
    em potencial, buscando contribuir com outras futuras pesquisas e estudos nesse
    cenário singular.'
  revisores:
  - arquivo_revisor: null
    comentarios: O texto necessita de ajuste substanciais. Destaco que as obsevações
      estão no manuscrito.
