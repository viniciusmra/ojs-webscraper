'14645':
  autores:
  - Ravel Viana Costa
  - Evando Francisco de Sousa
  - Antonio Cardoso Façanha
  data_iniciado: 27/12/2024
  id: '14645'
  resumo: 'A cidade, como produto das ações humanas, revela no seu espaço processos
    e formas espaciais distintas que foram concretizadas ao longo dos anos mediante
    a ação dos agentes produtores do espaço urbano. Nesse contexto, tem-se a problemática
    do processo de centralização como produto da confluência das atividades urbanas
    realizadas pelos agentes sociais. É nesse contexto que esta pesquisa pretende
    discutir a produção do espaço urbano na Avenida Presidente Médici em Timon (MA)
    em consonância às atividades de comércio e serviços. O objetivo geral da presente
    pesquisa visa discutir a produção do espaço urbano da Av. Presidente Médici, bairro
    Parque Piauí I em Timon (MA), em consonância às atividades terciárias. Com relação
    aos objetivos específicos, a pesquisa pretende: a) observar o papel dos agentes
    e processos formadores do espaço urbano de comércio e serviços da Av. Presidente
    Médici em Timon; b) investigar os fatores de causa do processo de centralização
    das atividades econômicas na cidade de Timon (MA); c) caracterizar as atividades
    comércio e serviços no espaço urbano da Av. Presidente Médici, Parque Piauí I
    em Timon (MA). Diante disso, foi possível constatar os fatores históricos de ocupação
    das áreas centrais como causa do processo de centralização das atividades urbanas.
    Observou-se também que os principais agentes produtores da área são essencialmente
    os proprietários dos meios de produção e o Estado, assim também, verificou-se
    a distribuição quali-quantitativa do setor terciário, com predomínio das atividades
    comerciais nos segmentos I, II e III, respectivamente.'
