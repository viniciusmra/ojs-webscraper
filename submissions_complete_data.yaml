'14413':
  autores:
  - Antonia Nataly da Silva Sousa
  - Bruno Ayron de Souza Aguiar
  - Gardene Maria de Sousa
  data_iniciado: 01/01/2024
  id: '14413'
  resumo: A fenologia é o estudo das fases dos ciclos de vida das espécies vegetais
    e sua relação com as mudanças ambientais. Através desses estudos podem ser traçadas
    estratégias de conservação e restauração de habitats perturbados. Esta pesquisa
    investigou a fenologia vegetativa e reprodutiva de Libidibia ferrea var. ferrea
    e Mimosa caesalpiniifolia em uma área ecotonal (Cerrado-Caatinga) no Bioparque
    Zoobotânico de Teresina (PI). Monitoramos semanalmente, de setembro de 2018 a
    agosto de 2019, fenofases vegetativas (brotamento, senescência e abscisão foliar)
    e reprodutivas (floração e frutificação) em 15 indivíduos de cada espécie durante
    as estações chuvosa e seca. Relacionamos essas fenofases às variações de precipitação
    e temperatura e usamos estatísticas circulares para identificar padrões sazonais
    e sincronia nos eventos fenológicos. O brotamento foliar das espécies ocorreu
    com a chegada da estação chuvosa para ambas as espécies, com baixa sazonalidade
    e alta sincronia. Por outro lado, senescência e abscisão foliar foram sazonais
    e ocorreram com baixa intensidade, a partir do fim da estação chuvosa. A floração
    foi sazonal, com maior intensidade alcançando 60%, mesmo no período de maior atividade,
    dentro da estação chuvosa. A frutificação apresentou baixa sazonalidade, persistindo
    durante quase todo o ano, porém com alta atividade (100%) e sincronia apenas dentro
    da estação chuvosa. Verificamos que as espécies apresentaram floração tardia,
    posterior ao início das chuvas, e seus frutos secos ficavam retidos na planta
    mãe por um longo tempo, o que pode ser um indício da formação de banco aéreo de
    sementes nestas espécies. Constatamos que o aumento da disponibilidade hídrica
    foi o “gatilho” para produção de novas folhas, e, sua redução, para a queda das
    folhas. A temperatura funcionou como um “gatilho” primário para o início da floração
    nestas espécies. Todavia, alguns desajustes fenológicos podem sinalizar a atuação
    das mudanças ambientais de origem antrópica ou climática no local.
