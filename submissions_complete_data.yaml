    nome: Francílio dos Santos
    recomendacao: Correções obrigatórias
  - arquivo_revisor: null
    comentarios: Senhora Editora,O trabalho em questão apresenta importante contribuição
      aos estudos de geodiversidade, especialmente, considerando os municípios escolhidos,
      pois carecem de maior atenção acadêmica. No entanto, é preciso atentar para
      algumas questões sensíveis em sua elaboração.O trabalho precisa passar obrigatoriamente
      por uma revisão de redação. Existem problemas de pontuação e erros de concordância
      no decorrer do texto.As palavras-chave praticamente replicam o título. É importante
      pensar em outras palavras que ajudem as ferramentas de busca a encontrar o texto. O
      objetivo é bastante ambicioso elencando sete municípios (Lagoa do Piauí, Monsenhor
      Gil, Amarante, Floriano, Guadalupe, Alvorada do Gurguéia e Bom Jesus). O trabalho
      não esclarece o motivo dessa escolha territorialmente descontínua.Um dos pilares
      da avaliação de potencial associado à geodiversidade é a caracterização geoambiental,
      especialmente, as informações sobre geologia e geomorfologia. O trabalho não
      apresenta esses dados, dificultando uma avaliação minimamente rigorosa.Existem
      instrumentais de avaliação consagrados na literatura. Basicamente se usa de
      abordagens quantitativas nessa avaliação. O texto afirma usar abordagem qualitativa,
      mas não há em sua metodologia nenhum procedimento identificado como tal.A avaliação
      não é realizada na área do território municipal integralmente, mas sim, em algumas
      unidades previamente selecionadas (o texto não deixa claro como foi feita essa
      seleção). Não se sabe também a abrangência espacial dessas áreas de interesse.Existem
      quadros que apresentam como fonte os autores, mas parecem ser de fonte secundária,
      visto que não há amparo metodológico direto para obter as informações apresentadas
      (Quadros de 1 a 7).Por fim recomenda-se a escolha de um dos municípios, realizando
      a caracterização geoambiental adequada, com a produção de mapa geológico e geomorfológico,
      bem como a adoção de instrumentais disponíveis na literatura. Essas medidas
      podem conduzir os autores ao amadurecimento metodológico do trabalho e produzir
      resultados mais densos e robustos.
    data_arquivo_revisor: null
    data_recomendacao: 11/02/2025
