'14375':
  autores:
  - Antonio Jerfson Lins de Freitas
  - Telma Bessa Sales
  data_iniciado: 02/08/2025
  id: '14375'
  resumo: O medo de se tornar uma vítima da violência urbana tem sido, nas últimas
    décadas, elemento primordial para a mudança de comportamento das pessoas, especialmente
    nos centros urbanos. Tais comportamentos não se referem apenas ao uso de equipamentos
    de segurança nas residências e pontos comerciais ou a formas de se comportar em
    ambientes públicos, mas também no próprio processo de ocupação do espaço urbano,
    do mercado imobiliário e, consequentemente, do processo de espraiamento das cidades.
    Para compreender como a percepção de violência e medo impacta os habitantes de
    Sobral-CE, cidade média localizada a cerca de 230 km da capital, Fortaleza, fizemos
    uma pesquisa com uma amostra cientificamente calculada (cerca de 500 respondentes),
    a partir da qual foi elaborada uma cartografia que permitiu a visualização de
    uma cidade dividida entre “bairros centrais seguros e desejados como moradia”
    e “bairros periféricos desconhecidos, inseguros ou violentos e evitados”. Tais
    resultados apontam para um processo de segregação e auto segregação socioespacial
    e consequente estigmatização socioespacial em Sobral, acompanhando o processo
    observado nos grandes centros urbanos. Diversos fatores contribuíram para que
    tais processos se instalassem em Sobral, como observado nas demais cidades onde
    ocorreram, como a falta de oferta de serviços públicos, negação de direitos básicos,
    ausência de sistema de transporte público e de espaços públicos de lazer, bem
    como o histórico processo de segregação das classes mais pobres da sociedade,
    relegando-as às áreas mais afastadas daquelas de interesse das elites locais.
