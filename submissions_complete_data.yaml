'14865':
  autores:
  - Daniel Trespach Porto
  data_iniciado: 02/04/2025
  id: '14865'
  resumo: The objective of this study was to quantitatively assess the distribution
    and variability of geodiversity elements in the Metropolitan Region of Porto Alegre
    (RMPA) through a Geodiversity Index and its relationships with land use and land
    cover. The methodology used was the Kernel Heat Map to obtain the Geodiversity
    Index, classified into Very Low, Low, Medium, High, and Very High categories.
    Subsequently, areas with a Very High index were overlaid with land use and land
    cover data. The results show that the region contains large areas with a Very
    High index. These areas exhibit significant diversity in lithology, soils, and
    landforms along the escarpment of the Southern Plateau, as well as in soils and
    hydrography in the floodplains and at the mouths of the Jacuí, Gravataí, and Sinos
    Rivers, with Urban Area and Farming area being the main land uses. In the latter
    region, there is dense urban occupation and extensive rice cultivation, which
    waterproofs and alters soils and modifies the drainage network. Soybean farming
    and Forest Plantation also stand out. On the escarpment of the Southern Plateau,
    Forest Plantation and a Mosaic of Uses predominate in areas originally covered
    by forests and grasslands. Considering the scale used, this study has been valuable
    for gaining a broad understanding of the geodiversity of the RMPA. It is possible
    to identify areas, elements, and abiotic processes that require further attention
    in future studies at larger scales, using both quantitative and qualitative methodologies.
