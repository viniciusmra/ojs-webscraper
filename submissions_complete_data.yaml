'14922':
  autores:
  - kalina salaib springer
  - Rosemy da Silva Nascimento
  - Simone de Mamann Ferreira
  data_iniciado: 28/06/2025
  id: '14922'
  resumo: 'A formação de professores voltada a uma educação que se almeja inclusiva,
    está prevista desde a Constituição Federal (BRASIL, 1988). Contudo, no âmbito
    da formação de professores de Geografia, a presença de temas específicos direcionados
    ao público alvo da Educação Especial e a inclusão destes, na Educação Básica ainda
    é carente nos projetos políticos pedagógicos dos cursos de licenciatura. Entretanto,
    na Universidade Federal de Santa Catarina (UFSC) essa realidade é  diferente.
    Assim, é objetivo deste artigo, apresentar as ações desenvolvidas no curso de
    Geografia, que, sob o nosso olhar, sustentam uma educação crítica e promotora
    de inclusão: apresentamos um projeto de extensão e uma prática na formação docente
    com a Cartografia Tátil, tratando da dimensão dos(as) estudantes cegos(as). Do
    ponto de vista metodológico realizamos um estudo de caso, a partir da caracterização
    e descrição de ações presentes no curso. Ao final do texto, trazemos considerações
    essas ações que, realizadas no âmbito do curso de Geografia da UFSC visam promover
    a inclusão e a acessibilidade no ensino de Geografia, contribuindo para a formação
    de professores preparados para atuar em contextos educacionais diversos.'
  revisores: []
  situacao: Em avaliação
  titulo: 'A FORMAÇÃO DO PROFESSOR/A DE GEOGRAFIA NA UFSC: AÇÕES PARA UMA EDUCAÇÃO
    CRÍTICA E INCLUSIVA'
  versao_autor: []
  versao_avaliacao: 14922-55319-1-RV.docx
'14923':
  autores:
  - Tamara de Castro Régis
  - Rosa Elisabete Militz Wypyczynski Martins
  data_iniciado: 29/06/2025
  id: '14923'
  resumo: 'Esta pesquisa busca compreender como a Educação Inclusiva é abordada nos
    currículos dos cursos de Licenciatura em Geografia de universidades públicas da
    Região Sul do Brasil. Parte do pressuposto de que discutir inclusão na formação
    inicial docente é fundamental, pois os saberes relacionados aos processos de inclusão
    de estudantes com deficiência integram as competências necessárias à prática profissional.
    A educação inclusiva é um direito garantido pela Lei de Diretrizes e Bases da
    Educação Nacional (Lei nº 9.394) e pela Lei Brasileira de Inclusão da Pessoa com
    Deficiência (Lei nº 13.146), que asseguram o acesso e a permanência dos estudantes
    com deficiência no ensino regular. A questão que norteia este estudo é: se a educação
    inclusiva é um direito legalmente garantido, de que forma os currículos dos cursos
    de Licenciatura em Geografia têm contemplado a formação docente para atender a
    essa demanda? A pesquisa utilizou abordagem qualitativa, por meio de levantamento
    bibliográfico e documental, analisando legislações educacionais e os Projetos
    Pedagógicos de Curso (PPC) de 19 cursos da Região Sul. A análise foi orientada
    por quatro categorias: presença ou ausência de disciplina específica sobre inclusão,
    saberes e conceitos nas ementas, localização da disciplina no currículo e sua
    carga horária. Os resultados mostram que, embora haja avanços na incorporação
    da temática nos cursos, persistem lacunas, com parte dos cursos ainda sem oferta
    de disciplina específica voltada à educação inclusiva. Essa ausência compromete
    a formação inicial dos licenciandos, refletindo diretamente na efetivação de práticas
    pedagógicas inclusivas nas escolas. Assim, reforça-se a necessidade de fortalecer
    a inserção da educação inclusiva nos currículos de formação docente, garantindo
    que os futuros professores estejam preparados para promover uma educação que respeite
    a diversidade e os direitos de todos os estudantes.'
  revisores: []
  situacao: Em avaliação
  titulo: PANORAMA SOBRE A EDUCAÇÃO INCLUSIVA NOS CURRÍCULOS DE CURSOS DE LICENCIATURA
    EM GEOGRAFIA DA REGIÃO SUL
  versao_autor: []
  versao_avaliacao: 14923-55322-1-RV.doc
'14926':
  autores:
  - Marcus Aurélio D'Alencar Mendonça
  - Meire Joisy Almeida Pereira
  - Marcos José Salgado Vital
  data_iniciado: 03/07/2025
  id: '14926'
  resumo: Este estudo analisou os impactos da “flexibilização” da legislação ambiental
    em Roraima, Brasil, com foco na redução da proteção florestal obrigatória em imóveis
    rurais de 80% para 50% na Amazônia Legal, ocorrida em 2022. Utilizando Sistemas
    de Informação Geográfica (SIG) e geodados do MapBiomas e PRODES/INPE, a pesquisa
    investigou mudanças no uso da terra e a participação no desmatamento de diferentes
    categorias fundiárias, avaliando terras públicas-comunitárias protegidas (terras
    indígenas e unidades de conservação) e terras particulares (propriedades/posses
    e assentamentos rurais). O período analisado abrangeu desde a criação do Estado,
    ocorrida em 1988, até os dados mais recentes disponíveis, de 2023. Os resultados
    demonstram que as terras protegidas mantiveram maior cobertura florestal (96%),
    com índices superiores em unidades de conservação estaduais (99,9%) e federais
    (99,6%), seguidas por terras indígenas (88,4%). Já as áreas particulares apresentaram
    menor conservação (74%), sendo 81,6% em imóveis rurais e 67,3% em assentamentos.
    Após 2019, verificou-se um aumento expressivo na taxa anual de desmatamento em
    imóveis particulares, impulsionado por mudanças políticas e econômicas, afetando
    a sustentabilidade socioambiental da região. Apesar do papel crucial das terras
    comunitárias na conservação da floresta amazônica, povos e comunidades tradicionais
    desses territórios enfrentam crescentes pressões externas, como a expansão agropecuária
    e o garimpo ilegal. Conclui-se que a manutenção das áreas protegidas e o fortalecimento
    da gestão comunitária são fundamentais para equilibrar conservação ambiental e
    desenvolvimento socioeconômico, especialmente diante do avanço do desmatamento
    desde áreas particulares.
  revisores:
  - arquivo_revisor: null
    comentarios: null
    data_arquivo_revisor: null
