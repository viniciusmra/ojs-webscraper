'14741':
  autores:
  - Fernanda Flores Silva dos Santos
  - Hélio Mário de Araújo
  data_iniciado: 17/02/2025
  id: '14741'
  resumo: No Brasil, diversos fatores favorecem o aumento da incidência de casos de
    dengue em áreas urbanas. Nesse aspecto, analisar a influência dos fatores socioambientais
    na distribuição dos casos em Aracaju, se reveste de fundamental importância na
    identificação de quais bairros/zonas estariam sujeitas as condições de vulnerabilidade
    capazes de contribuir para a disseminação da enfermidade pelos agentes transmissores.
    O presente artigo visa analisar a ocorrência e distribuição dos casos de Dengue
    no espaço urbano de Aracaju, incluindo a seleção de indicadores socioambientais
    apontados como fatores de vulnerabilidade para propagação da patologia, no período
    2010 a 2019. Os procedimentos metodológicos basearam-se em técnicas estatísticas
    de correlação (r), estimador de densidade de Kernel, taxa de incidência e indicadores
    sínteses de vulnerabilidade socioambiental, possibilitando, através da Cartografia
    Digital, a espacialização em mapas temáticos da doença a partir dos casos confirmados
    pelo Sistema de Informação de Agravos de Notificações (SINAN). Dentre os resultados
    encontrados para a dengue, verificou-se que a relação de incidência com o fator
    socioeconômico nas zonas de risco classificadas não se mostrou tão clara, visto
    que, nem sempre as áreas de maior risco epidemiológico culminaram nas maiores
    ocorrências da enfermidade, evidenciando que os fatores socioambientais tiveram
    um peso sobre as incidências, mas não foram determinantes. Conclui-se, portanto,
    que os condicionantes socioambientais das doenças podem servir de contribuição
    para planejamentos de políticas públicas a fim de realizar ações preventivas considerando
    os fatores de risco existente no espaço urbano de Aracaju que favorecem a disseminação
    da arbovirose e que são desiguais, atingindo em proporções diferentes a saúde
    dos citadinos.
  revisores:
