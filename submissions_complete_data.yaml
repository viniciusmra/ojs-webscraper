'14705':
  autores:
  - Kellyson Silva de Souza
  - Patricia Helana Mirandola Garcia
  data_iniciado: 27/12/2024
  id: '14705'
  resumo: A Educação Ambiental é essencial em todos os níveis educacionais, especialmente
    no ensino superior e na formação de professores, para conscientizar sobre o equilíbrio
    entre sociedade e natureza. Este estudo investiga os cursos de formação de professores
    em Rolim de Moura - RO, analisando suas grades curriculares. O objetivo é examinar
    como a Educação Ambiental é tratada nas instituições de ensino superior e integrada
    nos cursos. A pesquisa abrangeu sete instituições e 7 cursos, resultando em 45
    análises curriculares. Os resultados mostram diversas abordagens, com destaque
    para Biologia e Geografia, que oferecem mais disciplinas sobre o tema. Destaca-se
    a necessidade de uma abordagem mais integrada da Educação Ambiental nos cursos
    de Licenciatura para preparar os futuros professores diante dos desafios ambientais
    contemporâneos e promover uma consciência ambiental mais ampla e engajada nas
    comunidades educativas.
