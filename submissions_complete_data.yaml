'14423':
  autores:
  - Luana Micheli de Almeida
  - Jacimária Fonseca de Medeiros
  - Silvana Praxedes de Paiva Gurgel
  data_iniciado: 27/12/2024
  id: '14423'
  resumo: O estudo da Geodiversidade é recente e refere-se aos elementos abióticos
    da paisagem. Algumas modalidades de turismo, como o Geoturismo, turismo de natureza,
    turismo de aventura, tem a Geodiversidade como seu atrativo, caracterizado pela
    descrição dos monumentos naturais, dentre eles os aspectos geomorfológicos e geológicos.
    Assim, o Geoturismo refere-se à utilização dos geossítios e geomorfossítios para
    fins educativos por meio de serviços de turismo sustentável. Sobre a Geodiversidade
    no Rio Grande do Norte apresenta uma rica diversidade entre os picos, as serras,
    do sertão ao litoral, entre esses geomonumentos está a serra de Portalegre que
    possui aspectos físicos exuberantes, fazendo parte do Polo Rota do Frio norte
    riograndense e que desenvolve o turismo como uma das suas atividades econômicas
    por meio da exploração desta Geodiversidade. Nessa perspectiva, este trabalho
    tem como objetivo caracterizar a Geodiversidade do serra de Portalegre/RN, com
    foco no Geoturismo. A metodologia utilizada foi a inventariação e quantificação
    com o aplicativo do GEOSSIT da CPRM (2017), para isso foi realizado pesquisa de
    campos com intuito de observar a variedade de elementos abióticos presentes nos
    locais com atrativo turístico. Percebemos que a plataforma GEOSSIT se torna como
    uma ótima alternativa para ser utilizado na quantificação dos locais. O inventário
    do patrimônio de Portalegre resultou em quatro Geossítios considerados com relevância
    nacional, a Cachoeira do Pinga, a Ponta da Serra, Terminal Turístico da Fonte
    da Bica e As Torres em relação ao valor Científico acima de 200, e dez Sítios
    da Geodiversidade que contam uma história geológica até os dias atuais, incluindo
    materiais e processos das dinâmicas interna e externa. Desse modo, para despertar
    o interesse de turistas e comunitários é imprescindível promover esses atrativos
    naturais. Diante disso, espera-se que esse trabalho contribua com impactos positivos
    na comunidade científica com ampliação dos conhecimentos sobre a Geodiversidade.
