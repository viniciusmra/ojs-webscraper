'14799':
  autores:
  - IVANILDO LUCIANO DA LUZ
  - Daguinete Maria Chaves Brito
  data_iniciado: 02/08/2025
  id: '14799'
  resumo: O propósito da pesquisa que subsidiou este artigo foi a analisar as características
    socioterritoriais e socioeconômicas do distrito de Vila Velha do Cassiporé, localizado
    no município de Oiapoque, no Amapá. Os comunitários possuem, pelo menos, cinco
    séculos de ocupação e dinamicamente constroem relações com povoados, localidades
    e comunidades ribeirinhas e indígenas e são reconhecidos como Comunidade Remanescente
    de Quilombo; constituem um Projeto de Assentamento de Reforma Agrária; estão assentados
    sobre área com vários vestígios arqueológicos e se localizam na área de entorno
    do Parque Nacional do Cabo Orange e próximo a Terra Indígena Uaça, tornando-a
    uma área com gestão e manejo específicos. Como objetivo da pesquisa buscou ‘Analisar
    a formação do território e da territorialidade na comunidade de Vila Velha do
    Cassiporé’. Como resultado, infere-se que a comunidade não dispõe de assistência
    governamental, o que traz como principais consequências o abandono socioterritorial
    da população, desencadeando em processo intenso de emigração e reduzida qualidade
    de vida.
