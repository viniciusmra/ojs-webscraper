'14827':
  autores:
  - Helio Alves Lima
  - Maurício Ferreira Mendes
  - Luciano da Silva Guedes
  data_iniciado: 17/02/2025
  id: '14827'
  resumo: 'Os assentamentos rurais estão inseridos em diferentes paisagens e estas
    desempenham papel fundamental na produção de alimentos, contribuindo para busca
    pela cidadania, geração de empregos e renda no campo tocantinense. Assim, o objetivo
    deste artigo foi analisar as transformações da paisagem no assentamento Ouro Verde,
    município de Araguatins/Bico do Papagaio/Tocantins, bem como verificar o nível
    de organização dos camponeses, em relação às questões sociais, produtivas, de
    acesso às políticas públicas e sua influência no desenvolvimento rural. Para tal,
    utilizou-se quatro procedimentos metodológicos principais: 1) pesquisa bibliográfica
    e documental; 2) coleta de dados primários; 3) elaboração de representação cartográfica
    com uso do software gratuito QGIS, versão 3.18 e; 4) análise de dados. A pesquisa
    constatou a existência de transformações da paisagem na área do assentamento Ouro
    Verde, principalmente, voltadas para as atividades econômicas, como agricultura
    e pecuária, sendo estas fundamentais para a manutenção e reprodução das famílias,
    visto que o assentamento se encontra isolado e sem nenhum apoio do poder público
    local. Desta forma, percebe-se que é necessária a implantação de políticas públicas
    que de fato beneficiem os camponeses, como a manutenção das estradas vicinais
    de acesso ao assentamento, implantação de serviços de saúde e apoio a produção
    e a comercialização dos alimentos produzidos no Ouro Verde, promovendo, assim,
    uma incursão rumo ao desenvolvimento rural mais justo e igualitário.'
  revisores:
  - arquivo_revisor: null
    comentarios: null
    data_arquivo_revisor: null
    data_recomendacao: null
    nome: Rafhael Mascarenhas
    recomendacao: null
  - arquivo_revisor: null
    comentarios: 'A temática proposta mostra-se essencial para o debate sobre a atualidade
      do espaço rural brasileiro, em particular as questões que envolvem a posse e
      o uso da terra, a segurança alimentar, a sustentabilidade ambiental, a sucessão
      familiar, as políticas de apoio à reprodução do trabalho familiar, entre outras
      questões agrárias e agrícolas. Todavia, o artigo mostra-se fragilizado nos objetivos
      propostos, cujos resultados e discussões não aprofundam criticamente a análise
      das transformações socioespaciais em Ouro Verde.Também é notório que o trabalho
      apresenta problemas com correção gramatical (para classificar as regiões brasileiras,
      por exemplo) e de ABNT (chamadas de autores).No resumo, nota-se uma confusão
      sobre a concepção das paisagens, estas não desempenham papeis fundamentais na
      produção de alimentos, para a cidadania e geração de emprego e renda. Paisagem
      é reflexo das interações geoambientais, da relação sociedade e natureza. Na
      perspectiva geográfica, como conceito-chave, as paisagens são recortes dos momentos
      espaço-temporais das dinâmicas dos processos naturais, ecossistêmicos e dos
      aspectos socioculturais. As comunidades rurais sim, desempenham papeis essenciais
      para o desenvolvimento rural.Além domais,os estudos sobre assentamentos rurais
      são imprescindíveis para às análises das políticas públicas de desenvolvimento
      rural no Brasil, porém entendo ser importante ficar explicito no resumo a justificativa
      da escolha do assentamento Ouro Verde para a investigação proposta. Ou seja,
      por que pesquisar a paisagem do assentamento Ouro Verde? O que diferencia a
      história desse assentamento de outros similares em Tocantins? Ainda no resumo,
      seria interessante aprofundar a análise das políticas públicas voltadas para
      a criação dos assentamentos rurais no Brasil e, em particular, no Estado do
      Tocantins, pois em geral, as terras eleitas para a implantação dos projetos
      de assentamentos apresentam péssimas condições para a reprodução social das
      famílias.Outrossim, precisa deixar claro a relação de identidade das famílias
      investigadas. São assentadas ou camponesas? São duas categorias sociais distintas
      na história agrária brasileira.Na introdução do artigo, seria interessante definir
      a defesa da corrente de pensamento da categoria geográfica paisagem. Qual a
      concepção epistemológica de paisagem irá sustentar as ideias centrais desse
      estudo do assentamento Ouro Verde?No primeiro parágrafo, recomenda-se substituir
      a expressão ''promoção'' por ''compreensão'', haja vista que as paisagens não
      promovem o desenvolvimento rural, mas descrevem as alterações sociais e naturais
      intrínsecos ao desenvolvimento rural.No segundo parágrafo, excluir a chamada
      final autor/data, porque já referenciou no início do parágrafo.No sexto parágrafo,
      apresenta uma percepção restrita sobre o conceito do Rural, elegendo populações
      tradicionais como unicamente representativos dele. Lembrar que o rural como
      espaço mostra-se heterogêneo, multifacetado e polissêmico. Além do mais, para
      validar a assertiva apresentada, poderia pontuar em valores absolutos ou relativos
      a participação das populações tradicionais no desenvolvimento da economia rural
      brasileira e/ou do Tocantins, visando, portanto, descartar opiniões subjetivas.
      Também no sexto parágrafo, o enfoque do Desenvolvimento Rural centralizado apenas
      na análise do Condraf (2013) fragiliza o debate em questão.Além do mais, a opinião
      de Bergamasco (1997) data de um período de difusão política dos assentamentos
      rurais no Brasil, que pelo trecho destacado (espaço rural - camponeses, quilombolas,
      indígenas, pescadores artesanais, quebradeiras de coco) não qualifica os assentamentos
      rurais como motores do desenvolvimento da economia agrícola brasileira. Essa
      opinião estaria atualizada em razão das transformações recentes do espaço rural
      brasileiro?   Os estudos de Bergamasco (1997), parágrafo seis, mostra-se desatualizados.
      Ademais, como se manifesta a participação das demais regiões do país sobre a
      distribuição dos assentamentos rurais?Deve justificar melhor o porquê da escolha
      do assentamento Ouro Verde, haja vista o número significativo de assentamentos
      na região Bico do Papagaio.Após a introdução, poderia criar uma seção para contextualizar
      a política de reforma agrária voltada para a criação de assentamentos no Brasil,
      a análise de paisagens dos assentamentos rurais e as políticas de desenvolvimento
      rural, isso fortaleceria o debate e a análise dos resultados.Na metodologia,
      inicialmente propõe caracterizar a área de estudo, no caso o assentamento Ouro
      Verde, mas apresenta uma análise de escala centrada no município de Araguatins.
      Deve focar na caracterização do assentamento.No terceiro parágrafo da metodologia,
      percebe-se um ativismo político, este por si só não justificaria a escolha do
      assentamento Ouro Verde para a pesquisa. Ele é o único assentamento na região
      em que as políticas de desenvolvimento não são implantadas? Que outros aspectos
      ou fatores sustentariam a defesa de Ouro Verde para o estudo proposto?No quinto
      parágrafo da metodologia, não apresenta dados sobre a participação da economia
      camponesa em Araguatins, porque defende maiores investimentos?Nos procedimentos
      metodológicos, cita que utilizou de teses, leis, decretos e portarias, mas não
      são apresentados os créditos na lista de referências bibliográficas, inclusive
      a análise de tais documentos, ou parte deles, sustenta-se unicamente no estudo
      do Incra. Então, a interpretação pertence ao órgão federal, não pelo autor do
      artigo.Justificar a escolha do período de análise para a reprodução cartográfica.
      O assentamento data do final dos anos 1990, por que analisou o uso da terra
      e a cobertura vegetal a partir de 2013? Não está claro.No nono parágrafo dos
      procedimentos metodológicos, explicar qual a principal defesa da tese sobre
      as alterações das paisagens em Ouro Verde? Até esse trecho do artigo não é possível
      entender o porquê da análise da paisagem no assentamento.os resultados estão
      frágeis. Poderia propor um zoneamento ecológico-econômico do assentamento para
      enfatizar a defesa das alterações das paisagens.A escola é pública ou privada?
      Se for a primeira opção, desmente a ideia de abandono ´por parte das polítias
      públicas locais. Também não entendi o que corresponde o setor Branco (Figura
      2): O que ele representa ao assentamento? As imagens não explicam nada.Seria
      importante explicitar melhor o que os assentados produzem, quanto produzem,
      qual a produtividade do solo e como é feito o manejo do solo. Isso corroboraria
      as opiniões apresentadas nas considerações finais do artigo.Precisa apresentar
      dados técnicos de classificação de solo e clima. Só a apinião marginal dos assentados
      não validam a caracterização física de Ouro Verde.No trecho: "entendem que a
      ocupação da terra nessa região deve ser realizada de forma responsável, respeitando
      as leis ambientais e adotando práticas agroecológicas, rumo a um desenvolvimento
      rural justo e igualitário", poderia apresentar as narrativas dos assentados,
      os percentuais que defendem essa assertiva, já que realizou levantamentos empíricos.
      EM VÁRIOS TRECHOS DOS RESULTADOS SERIA IMPORTANTE APRESENTAR AS FALAS DOS ASSENTADOS
      (OS DILEMAS VIVIDOS, AS PERSPECTIVAS DE FUTURO).Um trecho importante da análise
      dos resultados refere-se aos dados cartográficos. A expansão da atividade pecuária
      e da agricultura está vinculada diretamente com a redução drástica da floresta
      ombrófila. Nota-se impacto ambiental nos dez anos de análise, em ritmo acelerado.
      A associação das pastagens com a retirada da mata nativa repercute em processos
      de perdas de solos e fragilidades no ecossistema local. Seria interessante apresentar
      dados de análise botânica, pedológico e zoológico. Quais espécies da flora e
      da fauna foram eliminados e quais resistiram com a expansão das atividades agropecuárias
      no assentamento? Também seria importante destacar o total da criação bovina
      no assentamento? A média de animais por família assentada? Isso reforçaria a
      defesa do assentamento como espaço de trabalho e da reprodução da vida, da organização
      social.No trecho que diz: "Organizados em coletivos formalizados, os camponeses
      estão aptos para acessarem as políticas de desenvolvimento rural, como o Programa
      de Aquisição de Alimentos (PAA) e o Programa Nacional de Alimentação Escolar
      (PNAE), abrindo novos canais de comercialização para além das feiras municipais".
      Isso desmente a sua opinião de isolamento das políticas públicas para os assentados.Os
      parágrafos 22 a 25 são revisão de literatura, não agregam em nada os resultados
      da pesquisa. Devem ser retirados.No trecho: "Outra questão importante é a dificuldade
      de acesso a financiamentos rurais subsidiados pelo governo, o atraso na liberação
      dos recursos e até mesmo a falta de recursos governamentais por meio de políticas
      públicas, como o PAA, o PNAE e o Programa Nacional de Fortalecimento da Agricultura
      Familiar (PRONAF), têm contribuído para que as famílias do Ouro Verde fiquem
      isoladas e sem apoio governamental". Faltam mais dados - absolutos e relativos
      - que possam aprofundar essa discussão.No outro trecho seguinte: "No caso do
      assentamento Ouro Verde, as famílias foram assentadas sem a preocupação por
      parte do poder público de fornecer subsídios para a produção, como o fornecimento
      de sementes, crédito e ATER para a produção e para a elaboração de projetos
      de acesso a políticas públicas". Vejo como problema da organização social dos
      assentados, haja vista as políticas federais institucionalizadas desde os anos
      1990, como o Programa Nacional de Crédito Fundiário (financiado com recursos
      provenientes do Fundo de Terras e da Reforma Agrária, fundo especial de natureza
      contábil criado pela Lei Complementar nº 93, de 1998, regulamentado pelo Decreto
      11.585, de 2023), e o Pronaf, já consolidado no Brasil, por exemplo.Nas considerações
      finais apresenta questões não analisadas nos resultados, como: o uso de sementes
      crioulas e da biodiversidade, como os subprodutos elaborados a partir das castanhas
      e do mesocarpo do babaçu; as práticas de manejo a fim de equilibrar as necessidades
      econômicas e a conservação dos recursos naturais, sobretudo a biodiversidade,
      a água e a terra.E no trecho: "a diversidade de alimentos cultivados ressalta
      a importância da agricultura camponesa na garantia e difusão da segurança alimentar
      e nutricional dos camponeses e das famílias das cidades do entorno que consomem
      essa produção". Poderia ter explorado mais a natureza da produção agrícola,
      as práticas socioprodutivas dos assentados.'
