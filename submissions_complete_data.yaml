'14514':
  autores:
  - Jacielly de Jesus Costa da Conceição
  - Leonardo Silva Soares
  - Paula Verônica Campos Jorge Santos
  - Arkley Marques Bandeira
  data_iniciado: 01/04/2024
  id: '14514'
  resumo: 'A Zona Costeira no Brasil tem sido significativamente impactada com as
    pressões antrópicas atreladas ao processo de urbanização não planejada, degradando
    os ecossistemas costeiros e ameaçando a sustentabilidade dos recursos naturais.
    Tendo como resultado, um crescimento desenfreado em orlas, supressão da vegetação,
    retirada de ecossistemas originais, suscetibilidade a eventos extremos e transtornos
    para a população residentes nessa área. O presente estudo apresenta uma avaliação
    da urbanização ocorrida na Orla da cidade de São Luís com enfoque na praia do
    Olho d’água. O objetivo propõe avaliar a vulnerabilidade ambiental e os processos
    urbanísticos da área e as modificações ambientais que a orla esteja sujeita. A
    metodologia consistiu na delimitação e caracterização da orla terrestre, seguindo
    os critérios do Projeto orla, sendo utilizado técnicas de geoprocessamento por
    meio do programa QGIS, versão 3.22.1 LTR. A classificação foi realizada com vetorização
    automática das imagens georreferenciadas para os anos de 2007 e 2021. Para elaboração
    dos mapas temáticos de uso e ocupação do solo, foram utilizadas as seguintes classes
    de uso e cobertura: Área Construída, Água, Praia, Vegetação Densa, Vegetação Rasteira,
    Solo Exposto e Aglomerado Subnormal. Como resultado houve uma diminuição nos valores
    de área de vegetação densa, dunas e praia, respectivamente uma redução de 6,86,
    3,42 e 16,04 hectares. Tais mudanças ocorreram concomitante à construção da avenida
    litorânea, que precisou retirar as dunas existentes no local, alterando a paisagem
    e o ecossistema natural da orla. Dessa forma, o crescimento desordenado que ocorreu
    na região, as intervenções antrópicas que potencializaram a supressão do ecossistema
    local e a perda da estética e paisagem natural do ambiente com as construções
    e, a vulnerabilidade ambiental da Orla gerada pelo crescimento urbano desordenado.
    Sendo proposto ainda, ações de gerenciamento costeiro na área.'
