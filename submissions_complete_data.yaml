'14678':
  autores:
  - Naiara Souza de Almeida Dias
  - Janio Santos
  data_iniciado: 27/12/2024
  id: '14678'
  resumo: Este artigo analisa a expansão de Maracás, Bahia, a partir da produção de
    suas periferias, abrangendo tanto a periferia popular, onde a migração e a pobreza
    se destacam, quanto a periferia voltada para as classes médias e altas. O texto
    pauta-se num estudo de campo, com abordagem documental, uso de dados primários
    e secundários, entrevistas e registros de fotografias. Além disso, foram confeccionados
    mapas temáticos para representar a espacialidade da produção da periferia maracaense.
    A análise da diferenciação socioespacial é fundamental para compreender a produção
    do espaço urbano no contexto capitalista e reflete diretamente as desigualdades
    sociais e econômicas, sendo possível analisar esse processo por meio da produção
    segmentada da periferia de Maracás. Essa segmentação, voltada para novos estratos
    de renda, busca reproduzir o capital, influenciada pela atuação dos agentes imobiliários
    na oferta de novos produtos, e pela intervenção do Estado, e resulta na mercantilização
    e segmentação da periferia da cidade. A expansão de Maracás é causa e efeito da
    produção de sua periferia, que vai desde loteamentos populares até os condomínios.
    O processo intensificou a diferenciação e gerou a segmentação periférica, com
    impactos na segregação, agora presente também entre espaços periféricos
  revisores:
