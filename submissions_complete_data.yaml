'14829':
  autores:
  - Vanessa Inácio de Carvalho
  - Roneide dos Santos Sousa
  - Joseane Maria da Conceição
  data_iniciado: 24/02/2025
  id: '14829'
  resumo: 'A resiliência climática é um termo que ganhou notoriedade nas discussões
    acadêmicas nos últimos anos, apesar de as discussões acerca das questões climáticas
    não serem debate novo. As questões relacionadas ao clima têm colocado entidades
    federais, estaduais e municipais de toda parte do mundo em alerta. Nesse contexto,
    pesquisas em diversos países têm discutido sobre a resiliência climática, frequentemente
    abordada numa perspectiva urbana, denominada de resiliência climática urbana.
    A bibliometria foi uma ferramenta utilizada para coletar produções científicas
    sobre essa temática, sendo assim, traz assurgindo a seguinte indagação: qual a
    contribuição da bibliometria para a produção acadêmica acerca da temática da resiliência
    climática? O objetivo desse estudo é realizar o levantamento bibliométrico de
    trabalhos disponíveis na base de dados Web of Science que tratam sobre a resiliência
    climática entre os anos 2010 a 2024. O artigo foi elaborado a partir do Portal
    de periódicos CAPES direcionada às bases e coleções da plataforma Web of Science,
    especificamente na coleção principal por tópicos, abrangendo todos os anos disponíveis
    (2010-2024) com os termos em português e inglês: “resiliência climática” e “climate
    resilience”. Os arquivos levantados, foram exportados e tratados no software Histcite.
    Destaca-se que, que através do levantamento bibliométrico obteve-se um total de
    137 artigos, sendo 2024 o ano com o maior número de publicações. Os três países
    com o maior número de publicações foram os Estados Unidos, Reino Unido e Canadá,
    e os três periódicos que se destacaram foram o Climate And Development, Wiley
    Interdisciplinary Reviews-Climate Change e International Journal Of Disaster Risk
    Reduction. Portanto, destaca-se ainda que, a bibliometria foi de suma importância
    para a compreensão da resiliência climática, de modo que, através da análise bibliométrica
    verificou-se nas pesquisas diversas definições desse termo apresentadas pelos
    autores, bem como estratégias para tornar as cidades resilientes aos eventos climáticos,
    e questões afins.'
