'14294':
  autores:
  - Ronilson Farias Majjione Balbuena
  - Tânia Paula da Silva
  data_iniciado: 27/12/2024
  id: '14294'
  resumo: O artigo objetiva apresentar um recorte de pesquisa de mestrado, propondo
    uma reflexão e análise da produção agroecológica, seja de alimentos e resistência
    para a permanência dos camponeses na terra, especificamente no Assentamento Roseli
    Nunes, município de Mirassol D’Oeste/MT. Consideram-se como elementos norteadores
    do estudo, as relações existentes de territorialidade, de trabalho, de produção,
    de renda, dos movimentos sociais e de conflitos no campo. Discutem-se as relações
    estabelecidas dentro do território do campesinato, frente ao avanço da produção
    capitalista, mantendo as prerrogativas de produção campesina alinhada à produção
    agroecológica e do trabalho familiar. Quanto à metodologia aplicada no decorrer
    da pesquisa, principiou-se do estudo das teorias da questão agrária, de conceito
    de agroecologia e de categorias geográficas, a saber, espaço e território. Em
    relação aos dados secundários, foram realizados levantamentos em Órgãos Governamentais
    e, num terceiro momento, a visita in loco ao assentamento/assentados com entrevistas,
    utilizando-se de questionário semiestruturado. Os resultados possibilitaram a
    interpretação de maneira quantiqualitativa dos dados coletados, inteirando da
    importância da agroecologia como método de resistência e luta contra o capital,
    na manutenção e preservação do território e dos meios naturais, para a permanência
    dos camponeses no campo e, sobretudo, da sua legitimidade para a produção de alimentos
    saudáveis e diversificados, contribuindo de maneira significativa para a soberania
    alimentar.
