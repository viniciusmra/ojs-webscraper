'14408':
  autores:
  - Lamarka LOpes Pereira
  - Maamar El Robrini
  - Márcia Thelma Rios Donato Marino
  data_iniciado: 21/12/2023
  id: '14408'
  resumo: 'Os sedimentos são a fonte mais importante de informações da evolução geológica
    durante o Holoceno, mas foram pouco explorados de ponto de vista de fácies, granulometria
    e geoquímica. A Laguna Salgada (13 km de comprimento, 1 km de largura), está inserida
    na Planície Litorânea de Itarema com características de laguna colmatada e restrita,
    com profundidade inferior a 2 m (período chuvoso), e 0,60 m (estiagem), separada
    do oceano Atlântico por barras arenosas. A área é dominada por ondas (0,8-1,5
    m), micro-maré semidiurna (altura de 1,55 m) e correntes de maré (0,10-0,59 m/s).
    A região está compartimentada em: Tabuleiros Pré-Litorâneos e Planície costeira,
    sendo subdividida em planícies: lagunar, de maré, flúviomarinha e arenosa (dunas
    móveis e fixas, cordões litorâneos, canais de maré, barras arenosas e praias).
    A metodologia foi baseada na: aquisição de 10 testemunhos; análise faciológica
    e granulometria, determinação do teor de MO/CO. O arranjo estratigráfico (Holoceno)
    aponta 5 tipos de depósitos: lagunar, dunar, eolianitos, praial e leques aluviais
    e 7 litofácies foram associados: lama e lama arenosa, areia lamosa, areia fina,
    areia média e areno-argilosa conglomerática. A reconstrução geológica indica eventos
    transgressivos progradantes durante os quais o sistema laguna-barreira foi instalado
    sobre os leques aluviais pelo barramento de pequenos canais de maré, formando
    a planície lagunar. A laguna variou de tamanho, em função da progradação da barreira
    como posteriormente pelo avanço dos sedimentos eólicos.'
